  const favProjects=(favorites||[]).filter(f=>f.type==='project').map(f=>projects.find(p=>(p.id||p.name)===f.id)).filter(Boolean);
  const item=(k,ico,label,n,extra={})=>(
    <button key={k} onClick={()=>nav(k,extra)} className={'w-full flex items-center gap-3 px-3 py-2 rounded-xl text-sm font-semibold '+(view.tab===k&&(!extra.prjId||view.prjId===extra.prjId)?'bg-[var(--accent-50)] text-[var(--accent-700)]':'text-stone-600 hover:bg-stone-100')}>
      <span style={{fontSize:15}}>{ico}</span><span className="flex-1 text-left truncate">{label}</span>
      {n>0&&<span className="text-[10px] text-stone-400 font-bold">{n}</span>}
    </button>
  );
  return(
    <div className="hidden md:flex flex-col w-64 flex-shrink-0 bg-white border-r border-stone-100 h-full overflow-y-auto px-3 py-4">
      <div className="flex items-center gap-2 px-2 mb-4">
        <div className="w-8 h-8 rounded-full bg-[var(--accent-600)] flex items-center justify-center text-white font-black text-sm flex-shrink-0">J</div>
        <span className="text-sm font-black text-stone-800 truncate">Jayesh</span>
      </div>
      <button onClick={onAddTask} className="w-full flex items-center gap-2 px-3 py-2.5 mb-3 bg-[var(--accent-600)] text-white rounded-xl text-sm font-bold shadow-sm active:bg-[var(--accent-700)]">
        <span className="text-lg leading-none">＋</span> Add task
      </button>
      <div className="space-y-0.5 mb-3">
        {item('search','🔍','Search')}
        {item('inbox','📥','Inbox',inboxN)}
        {item('today','🏠','Today',todayN)}
        {item('scheduled','📅','Upcoming')}
        {item('filters','🎛️','Filters & Labels')}
        {item('review','📋','Weekly Review')}
        {item('eisenhower','🧭','Eisenhower Matrix')}
        {item('mission','🧭','My Mission')}
        {item('circle','🌤️','Circle of Influence')}
        {item('browse','📁','Browse')}
      </div>
      {favProjects.length>0&&(
        <div className="mb-3">
          <button onClick={()=>setShowFavs(!showFavs)} className="w-full flex items-center justify-between px-3 py-1.5 text-[10px] font-black text-stone-400 uppercase tracking-widest">
            <span>★ Favorites</span><span>{showFavs?'▾':'▸'}</span>
          </button>
          {showFavs&&favProjects.map(p=>item('project','#',p.name,prjCount(p),{prjId:p.id||p.name}))}
        </div>
      )}
      <div className="mb-3 flex-1">
        <button onClick={()=>setShowPrjs(!showPrjs)} className="w-full flex items-center justify-between px-3 py-1.5 text-[10px] font-black text-stone-400 uppercase tracking-widest">
          <span>My Projects</span><span>{showPrjs?'▾':'▸'}</span>
        </button>
        {showPrjs&&tree.map(p=>(
          <button key={p.id} onClick={()=>nav('project',{prjId:p.id||p.name})} className={'w-full flex items-center gap-2 px-3 py-1.5 rounded-xl text-sm font-semibold '+(view.tab==='project'&&view.prjId===(p.id||p.name)?'bg-[var(--accent-50)] text-[var(--accent-700)]':'text-stone-600 hover:bg-stone-100')} style={{paddingLeft:12+p.depth*14}}>
            <span style={{color:p.color||'#6366f1'}}>#</span><span className="flex-1 text-left truncate">{p.name}</span>
            <span className="text-[10px] text-stone-400 font-bold">{prjCount(p)}</span>
          </button>
        ))}
      </div>
      <div className="border-t border-stone-100 pt-2">
        {item('settings','⚙️','Settings')}
      </div>
    </div>
  );
}

/* ── Tiny helpers ────────────────────────────────────── */
function Chip({on,click,children}){return<button onClick={click} className={'px-3 py-2 rounded-xl text-xs font-bold border flex-shrink-0 '+(on?'bg-[var(--accent-600)] text-white border-[var(--accent-600)]':'bg-white text-stone-600 border-stone-200')}>{children}</button>}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js').catch(function(){})});}
</script>
</body>
</html>
