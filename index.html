<html lang="en">

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>

  <meta name="apple-mobile-web-app-capable" content="yes"/>

    .pri-ring-1{box-shadow:0 0 0 2px #ef4444}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;

/* ── Utilities ──────────────────────────────────────── */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const todayISO=()=>new Date().toISOString().slice(0,10);
const addDays=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)};
const nextRecur=(d,r)=>{const dt=new Date(d+'T00:00:00');if(r==='daily')dt.setDate(dt.getDate()+1);else if(r==='weekly')dt.setDate(dt.getDate()+7);else if(r==='monthly')dt.setMonth(dt.getMonth()+1);else if(r==='yearly')dt.setFullYear(dt.getFullYear()+1);return dt.toISOString().slice(0,10)};
const fmtDate=d=>{if(!d)return'';if(d===todayISO())return'Today';if(d===addDays(1))return'Tomorrow';const dt=new Date(d+'T00:00:00');const diff=Math.ceil((dt-new Date(todayISO()+'T00:00:00'))/(864e5));if(diff>0&&diff<=6)return dt.toLocaleDateString('en-IN',{weekday:'short'});return dt.toLocaleDateString('en-IN',{day:'numeric',month:'short'})};
const fmtFull=d=>d?new Date(d+'T00:00:00').toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):'';
const fmtCreated=d=>d?new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short'}):'';
const isOverdue=d=>!!d&&d<todayISO();
const withinN=(d,n)=>{if(!d)return false;const s=new Date(todayISO()+'T00:00:00'),e=new Date(s);e.setDate(e.getDate()+n);const dt=new Date(d+'T00:00:00');return dt>=s&&dt<=e};
const daysOver=d=>{if(!isOverdue(d))return 0;return Math.ceil((new Date(todayISO()+'T00:00:00')-new Date(d+'T00:00:00'))/(864e5))};
const effPri=t=>{if(t.priority)return t.priority;const n=daysOver(t.dueDate);if(n>=3)return'P1';if(n>=2)return'P2';if(n>=1)return'P3';return null};
const sortDP=list=>{const po={P1:1,P2:2,P3:3,P4:4};return[...list].sort((a,b)=>{const pa=po[effPri(a)]||5,pb=po[effPri(b)]||5;const da=a.dueDate||'9999',db=b.dueDate||'9999';// dated tasks: sort by date first, then priority within same date
if(da!=='9999'||db!=='9999'){if(da!==db)return da.localeCompare(db);return pa-pb}// no date: priority order
return pa-pb})};
const ls={get:(k,d=null)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}};

/* ── NLP Task Parser ────────────────────────────────── */
const WD=['sun','mon','tue','wed','thu','fri','sat'];
const nextWD=n=>{const t=new Date();t.setHours(0,0,0,0);const diff=(n-t.getDay()+7)%7||7;const d=new Date(t);d.setDate(d.getDate()+diff);return d.toISOString().slice(0,10)};
const parseNL=(raw,projects,labels)=>{
  let text=raw,dueDate=null,priority=null,lbls=[],project=null;
  // Priority: p1-p4 or !!! !! !
  const pm=text.match(/\bp([1-4])\b/i);if(pm){priority='P'+pm[1];text=text.replace(pm[0],'').trim()}
  if(!priority){const em=text.match(/!!!|!!|!/);if(em){priority=em[0]==='!!!'?'P1':em[0]==='!!'?'P2':'P3';text=text.replace(em[0],'').trim()}}
  // Labels: #tag
  const tr=/#([a-zA-Z0-9_]+)/g;let m;while((m=tr.exec(raw))!==null)lbls.push(m[1]);text=text.replace(/#[a-zA-Z0-9_]+/g,'').trim();
  // Project: @name
  const atIdx=text.indexOf('@');
  if(atIdx!==-1){
    const after=text.slice(atIdx+1);
    const sorted=[...projects].sort((a,b)=>b.name.length-a.name.length);
    const match=sorted.find(p=>after.toLowerCase().startsWith(p.name.toLowerCase()));
    if(match){project=match.name;text=(text.slice(0,atIdx)+after.slice(match.name.length)).replace(/\s+/g,' ').trim()}
    else{const wm=after.match(/^([a-zA-Z0-9_]+)/);if(wm){const pn=projects.find(p=>p.name.toLowerCase()===wm[1].toLowerCase());if(pn){project=pn.name;text=(text.slice(0,atIdx)+after.slice(wm[1].length)).replace(/\s+/g,' ').trim()}}}
  }
  // Dates
  if(/\btoday\b/i.test(text)){dueDate=todayISO();text=text.replace(/\btoday\b/i,'').trim()}
  else if(/\b(tomorrow|tmrw|tmr)\b/i.test(text)){dueDate=addDays(1);text=text.replace(/\b(tomorrow|tmrw|tmr)\b/i,'').trim()}
  else if(/\bnext week\b/i.test(text)){dueDate=addDays(7);text=text.replace(/\bnext week\b/i,'').trim()}
  else if(/\bnext month\b/i.test(text)){dueDate=addDays(30);text=text.replace(/\bnext month\b/i,'').trim()}
  else{for(let i=0;i<7;i++){const re=new RegExp('\\b'+WD[i],'i');if(re.test(text)&&!dueDate){dueDate=nextWD(i);text=text.replace(re,'').trim();break}}}
  if(!dueDate){const inM=text.match(/\bin (\d+) (day|week|month)s?\b/i);if(inM){const n=parseInt(inM[1]),u=inM[2].toLowerCase();dueDate=u==='day'?addDays(n):u==='week'?addDays(n*7):addDays(n*30);text=text.replace(inM[0],'').trim()}}
  text=text.replace(/\s+/g,' ').trim();
  return{text:text||raw.trim(),dueDate,priority,labels:lbls,project};
};

/* ── Google + Drive ─────────────────────────────────── */
const GCAL='https://www.googleapis.com/calendar/v3';
const DAPI='https://www.googleapis.com/drive/v3';

let _tc=null,_tok=null;
let _onAuthFail=null;
const gcal={
  setAuthFailHandler(fn){_onAuthFail=fn},
  init(cid,onOk){if(!window.google?.accounts?.oauth2)return false;_tc=window.google.accounts.oauth2.initTokenClient({client_id:cid,scope:'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/drive.appdata',callback:r=>{if(r.access_token){_tok=r.access_token;ls.set('tok',_tok);onOk()}}});const s=ls.get('tok');if(s){_tok=s;onOk()}return true},
  connect(force){_tc&&_tc.requestAccessToken({prompt:force?'consent':''})},
  invalidate(){_tok=null;ls.set('tok',null);if(_onAuthFail)_onAuthFail()},
  _h(){return{'Authorization':'Bearer '+_tok,'Content-Type':'application/json'}},
  async create(t){if(!_tok||!t.dueDate)return null;try{const r=await fetch(GCAL+'/calendars/primary/events',{method:'POST',headers:gcal._h(),body:JSON.stringify({summary:t.text,start:{date:t.dueDate},end:{date:t.dueDate},description:[t.priority&&('P: '+t.priority),(t.labels&&t.labels.length)&&('Labels: '+t.labels.join(', ')),t.project&&('Project: '+t.project)].filter(Boolean).join('\n')})});if(r.status===401){gcal.invalidate();return null}return(await r.json()).id||null}catch{return null}},
  async del(eid){if(!_tok||!eid)return;try{await fetch(GCAL+'/calendars/primary/events/'+eid,{method:'DELETE',headers:gcal._h()})}catch{}}
};
// FIXED: stable file name + searches old version files for recovery
const STABLE_FILE='gtd_braindump.json';
const OLD_FILES=['gtd_v5.json','gtd_v4.json','gtd_v3.json','gtd_v2.json'];
const drv={
  async _search(fname){try{const r=await fetch(DAPI+'/files?spaces=appDataFolder&q=name%3D%27'+fname+'%27&fields=files(id)',{headers:gcal._h()});if(r.status===401){gcal.invalidate();return null}if(!r.ok)return null;const d=await r.json();return(d.files&&d.files[0]&&d.files[0].id)||null}catch{return null}},
  async _read(fid){try{const r=await fetch(DAPI+'/files/'+fid+'?alt=media',{headers:gcal._h()});if(!r.ok)return null;return await r.json()}catch{return null}},
  // Save always to stable file name
  async save(data){
    if(!_tok)return false;
    try{
      // Find stable file or fall back to any existing file
      let fid=ls.get('drv_stable_fid',null);
      if(!fid){fid=await drv._search(STABLE_FILE);if(fid)ls.set('drv_stable_fid',fid)}
      const ts=Date.now();const content=JSON.stringify({...data,_ts:ts,_file:STABLE_FILE});
      const bnd='gtdfix2';
      const meta=fid?'{}':JSON.stringify({name:STABLE_FILE,parents:['appDataFolder']});
      const url='https://www.googleapis.com/upload/drive/v3/files'+(fid?'/'+fid:'')+'?uploadType=multipart';
      const body='--'+bnd+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+meta+'\r\n--'+bnd+'\r\nContent-Type: application/json\r\n\r\n'+content+'\r\n--'+bnd+'--';
      const r=await fetch(url,{method:fid?'PATCH':'POST',headers:{'Authorization':'Bearer '+_tok,'Content-Type':'multipart/related; boundary='+bnd},body});
      if(r.status===401){gcal.invalidate();return false}
      if(r.ok){const d=await r.json();if(d.id){ls.set('drv_stable_fid',d.id)};ls.set('tasks_ts',ts)}
      return r.ok;
    }catch{return false}
  },
  // Load: try stable file first, then ALL old version files (recovery)
  async load(){
    if(!_tok)return null;
    for(const fname of[STABLE_FILE,...OLD_FILES]){
      try{
        const fid=await drv._search(fname);
        if(!fid)continue;
        const data=await drv._read(fid);
        if(data&&data.tasks&&data.tasks.length>0){
          data._foundIn=fname;data._fid=fid;
          return data;
        }
      }catch{continue}
    }
    return null;
  }
};

/* ── Constants ──────────────────────────────────────── */
const PC=['#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#3b82f6','#8b5cf6','#ec4899','#78716c','#64748b'];
const PRI_COLOR={P1:'#ef4444',P2:'#f97316',P3:'#3b82f6',P4:'#9ca3af'};
const PRI_BG={P1:'bg-red-50',P2:'bg-orange-50',P3:'bg-blue-50',P4:'bg-stone-50'};
const PRI_LABEL={P1:'🔴 P1 – Priority 1',P2:'🟠 P2 – Priority 2',P3:'🔵 P3 – Priority 3',P4:'⚪ P4 – Priority 4'};
const EIS=[{k:'do',s:'Do Now',l:'Urgent + Important'},{k:'schedule',s:'Schedule',l:'Important, Not Urgent'},{k:'delegate',s:'Delegate',l:'Urgent, Not Important'},{k:'drop',s:'Drop',l:'Not Urgent/Important'}];
const RECUR_OPT={daily:'Daily',weekly:'Weekly',monthly:'Monthly',yearly:'Yearly'};
const GOAL_TIERS=[{k:'short',l:'🎯 Short-term',s:'< 3 months'},{k:'medium',l:'📈 Medium-term',s:'3–12 months'},{k:'long',l:'🌟 Long-term',s:'1–3 years'},{k:'vlong',l:'🚀 Very Long-term',s:'3+ years'}];
const LBL_COLORS=['bg-sky-100 text-sky-700 border-sky-200','bg-amber-100 text-amber-700 border-amber-200','bg-pink-100 text-pink-700 border-pink-200','bg-purple-100 text-purple-700 border-purple-200','bg-teal-100 text-teal-700 border-teal-200','bg-rose-100 text-rose-700 border-rose-200'];
const lblColor=(l,lbls)=>{const i=Math.max(0,lbls.indexOf(l))%LBL_COLORS.length;return LBL_COLORS[i]||LBL_COLORS[0]};
// Multi-level project tree helpers
const prjDescendantIds=(projects,id)=>{const kids=projects.filter(p=>p.parentId===id);return kids.flatMap(k=>[k.id,...prjDescendantIds(projects,k.id)])};
const prjAncestors=(projects,id)=>{const p=projects.find(x=>x.id===id);if(!p||!p.parentId)return[];const parent=projects.find(x=>x.id===p.parentId);return parent?[...prjAncestors(projects,parent.id),parent]:[]};
const prjTree=(projects,parentId=null,depth=0)=>projects.filter(p=>(p.parentId||null)===parentId).flatMap(p=>[{...p,depth},...prjTree(projects,p.id,depth+1)]);

/* ── App ────────────────────────────────────────────── */
function App(){
  // State
  const [tasks,setTasks]=useState(()=>ls.get('tasks',[]));
  const [labels,setLabels]=useState(()=>ls.get('labels',['Personal','Work','Health','Finance']));
  const [projects,setProjects]=useState(()=>{
    const raw=ls.get('projects_v2',null);
    if(raw)return raw;
    const old=ls.get('projects',['Home','Office','Family']);
    return old.map((name,i)=>({id:uid(),name,color:PC[i%PC.length]}));
  });
  const [view,setView]=useState({tab:'today',prjId:null,lbl:null}); // tab: today|inbox|browse|project|label|search|settings|goals
  const [editTask,setEditTask]=useState(null);
  const [showQuickAdd,setShowQuickAdd]=useState(false);
  const [searchQ,setSearchQ]=useState('');
  const [gcalCid,setGcalCid]=useState(()=>ls.get('gcal_cid',''));
  const [gcalOk,setGcalOk]=useState(false);
  const [driveOk,setDriveOk]=useState(false);
  const [syncing,setSyncing]=useState(false);
  const [toast,setToast]=useState('');
  const [ready,setReady]=useState(false);
  const [selectMode,setSelectMode]=useState(false);
  const [selected,setSelected]=useState([]);
  const [showLblAssign,setShowLblAssign]=useState(false);
  const [showPrjMove,setShowPrjMove]=useState(false);

  // Init
  useEffect(()=>{
    const co=new Date();co.setDate(co.getDate()-7);
    const t=ls.get('tasks',[]).map(t=>{if(t.type==='wish'&&t.status==='inbox'&&new Date(t.createdAt)<co)return{...t,status:'archived',autoArchived:true};return t});
    ls.set('tasks',t);setTasks(t);setReady(true);
  },[]);
  useEffect(()=>{
    if(!gcalCid)return;
    gcal.setAuthFailHandler(()=>{
      setGcalOk(false);setDriveOk(false);
      showToast('⚠️ Google session expired — please reconnect in Settings');
    });
    const tryInit=()=>{const ok=gcal.init(gcalCid,()=>setGcalOk(true));if(!ok)setTimeout(tryInit,500)};
    if(window.google?.accounts?.oauth2)tryInit();
    else{const id=setInterval(()=>{if(window.google?.accounts?.oauth2){clearInterval(id);tryInit()}},400);return()=>clearInterval(id)}
  },[gcalCid]);
  const runDriveSync=useCallback(async()=>{
    try{
      const driveData=await drv.load();
      const localTasks=ls.get('tasks',[]);
      const localTs=ls.get('tasks_ts',0);
      if(!driveData||!driveData.tasks){
        const ok=await drv.save({tasks:localTasks,labels,projects,_ts:Date.now()});
        setDriveOk(ok);
        if(ok)showToast('☁️ '+localTasks.length+' tasks saved to Drive');
        else showToast('⚠️ Drive API may not be enabled — see Settings');
        return;
      }
      setDriveOk(true);
      const driveTasks=driveData.tasks||[];
      const driveTs=driveData._ts||0;
      if(localTasks.length===0&&driveTasks.length>0){
        setTasks(driveTasks);ls.set('tasks',driveTasks);ls.set('tasks_ts',driveTs);
        if(driveData.labels){setLabels(driveData.labels);ls.set('labels',driveData.labels)}
        if(driveData.projects){setProjects(driveData.projects);ls.set('projects_v2',driveData.projects)}
        showToast('📥 Restored '+driveTasks.length+' tasks from Drive!');
        if(driveData._foundIn&&driveData._foundIn!==STABLE_FILE){drv.save({tasks:driveTasks,labels,projects})}
      } else if(driveTs>localTs&&driveTasks.length>=localTasks.length){
        setTasks(driveTasks);ls.set('tasks',driveTasks);ls.set('tasks_ts',driveTs);
        if(driveData.labels){setLabels(driveData.labels);ls.set('labels',driveData.labels)}
        if(driveData.projects){setProjects(driveData.projects);ls.set('projects_v2',driveData.projects)}
        showToast('📥 '+driveTasks.length+' tasks synced from Drive');
      } else {
        const ok=await drv.save({tasks:localTasks,labels,projects,_ts:Math.max(localTs,Date.now())});
        if(ok&&driveData._foundIn&&driveData._foundIn!==STABLE_FILE)showToast('☁️ '+localTasks.length+' tasks migrated to Drive');
      }
    }catch(e){setDriveOk(false);showToast('⚠️ Drive sync error — working offline')}
  },[labels,projects]);

  useEffect(()=>{if(!gcalOk)return;runDriveSync()},[gcalOk]);

  const showToast=(m,ms=3000)=>{setToast(m);setTimeout(()=>setToast(''),ms)};
  const persist=useCallback((t,l,p)=>{const fl=l||labels,fp=p||projects;setTasks(t);ls.set('tasks',t);const ts=Date.now();ls.set('tasks_ts',ts);if(gcalOk&&driveOk)drv.save({tasks:t,labels:fl,projects:fp,_ts:ts}).catch(()=>{});},[gcalOk,driveOk,labels,projects]);
  const persistLbls=l=>{setLabels(l);ls.set('labels',l);if(gcalOk&&driveOk)drv.save({tasks,labels:l,projects}).catch(()=>{})};
  const persistPrjs=p=>{setProjects(p);ls.set('projects_v2',p);if(gcalOk&&driveOk)drv.save({tasks,labels,projects:p}).catch(()=>{})};

  // Task operations
  const addTask=async(taskData)=>{
    const t={id:uid(),createdAt:new Date().toISOString(),dueDate:null,labels:[],project:null,priority:null,eisenhower:null,type:'task',status:'inbox',completedAt:null,calendarEventId:null,recurring:null,subtasks:[],goalType:null,...taskData};
    let newTasks=[...tasks,t];
    if(gcalOk&&t.dueDate){const cid=await gcal.create(t);if(cid){t.calendarEventId=cid;newTasks=newTasks.map(x=>x.id===t.id?t:x)}}
    persist(newTasks);
  };
  const complete=async id=>{
    const task=tasks.find(t=>t.id===id);if(!task)return;
    const upd={...task,status:'completed',completedAt:new Date().toISOString()};
    let nt=tasks.map(t=>t.id===id?upd:t);
    if(gcalOk&&upd.calendarEventId)gcal.del(upd.calendarEventId);
    if(task.recurring&&task.dueDate){const nxt={...task,id:uid(),dueDate:nextRecur(task.dueDate,task.recurring),status:'active',completedAt:null,calendarEventId:null,createdAt:new Date().toISOString(),subtasks:[]};nt=[...nt,nxt];if(gcalOk){const cid=await gcal.create(nxt);if(cid)nt=nt.map(t=>t.id===nxt.id?{...t,calendarEventId:cid}:t)}}
    persist(nt);
  };
  const uncomplete=id=>persist(tasks.map(t=>t.id===id?{...t,status:t.dueDate?'active':'inbox',completedAt:null}:t));
  const archive=id=>persist(tasks.map(t=>t.id===id?{...t,status:'archived'}:t));
  const restore=id=>persist(tasks.map(t=>t.id===id?{...t,status:'inbox'}:t));
  const del=async id=>{const t=tasks.find(x=>x.id===id);if(gcalOk&&t?.calendarEventId)gcal.del(t.calendarEventId);persist(tasks.filter(x=>x.id!==id))};
  const toggleSub=(tid,sid)=>persist(tasks.map(t=>t.id!==tid?t:{...t,subtasks:(t.subtasks||[]).map(s=>s.id===sid?{...s,done:!s.done}:s)}));
  const saveEdit=async upd=>{
    // status: if has dueDate → active (scheduled), else inbox
    let s=upd.project?'active':!upd.dueDate?'inbox':'active';
    if(upd.status==='completed'||upd.status==='archived')s=upd.status;
    const old=tasks.find(t=>t.id===upd.id);let ceid=upd.calendarEventId;
    if(gcalOk){if(upd.dueDate&&s!=='archived'){if(!ceid)ceid=await gcal.create({...upd,status:s});else if(old?.dueDate!==upd.dueDate||old?.text!==upd.text){gcal.del(ceid);ceid=await gcal.create({...upd,status:s})}}else if(ceid){gcal.del(ceid);ceid=null}}
    persist(tasks.map(t=>t.id===upd.id?{...upd,status:s,calendarEventId:ceid}:t));setEditTask(null);
  };
  const syncAll=async()=>{setSyncing(true);const dated=tasks.filter(t=>t.dueDate&&t.status!=='archived'&&!t.calendarEventId);let upd=[...tasks];let cnt=0;for(const t of dated){const id=await gcal.create(t);if(id){upd=upd.map(u=>u.id===t.id?{...u,calendarEventId:id}:u);cnt++}}persist(upd);setSyncing(false);showToast('✅ Synced '+cnt+' tasks')};
  const exportJSON=()=>{const d={tasks,labels,projects,exportedAt:new Date().toISOString()};const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='braindump-backup-'+todayISO()+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);showToast('💾 Backup downloaded!')};
  const importJSON=file=>{if(!file)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.tasks&&Array.isArray(d.tasks)){persist(d.tasks);if(d.labels)persistLbls(d.labels);if(d.projects)persistPrjs(d.projects);showToast('✅ Imported '+d.tasks.length+' tasks!')}else showToast('❌ Invalid backup file')}catch{showToast('❌ Could not read file')}};r.readAsText(file)};

  // Multi-select bulk operations
  const toggleSel=id=>setSelected(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const exitSelect=()=>{setSelectMode(false);setSelected([])};
  const copySelected=()=>{const texts=selected.map(id=>tasks.find(t=>t.id===id)).filter(Boolean).map(t=>'• '+t.text);if(navigator.clipboard)navigator.clipboard.writeText(texts.join('\n')).then(()=>showToast('📋 Copied '+texts.length+' tasks')).catch(()=>showToast('❌ Copy failed'));exitSelect()};
  const assignLabels=lbls=>{persist(tasks.map(t=>!selected.includes(t.id)?t:{...t,labels:[...new Set([...(t.labels||[]),...lbls])]}));setShowLblAssign(false);exitSelect();showToast('🏷️ Labels applied to '+selected.length+' tasks')};
  const moveSelToProject=prjName=>{persist(tasks.map(t=>!selected.includes(t.id)?t:{...t,project:prjName||null,status:prjName?'active':'inbox'}));exitSelect();showToast('📁 Moved '+selected.length+' tasks to '+(prjName||'Inbox'))};
  const archiveSel=()=>{persist(tasks.map(t=>selected.includes(t.id)?{...t,status:'archived'}:t));exitSelect()};
  const deleteSel=()=>{selected.forEach(id=>{const t=tasks.find(x=>x.id===id);if(gcalOk&&t?.calendarEventId)gcal.del(t.calendarEventId)});persist(tasks.filter(t=>!selected.includes(t.id)));exitSelect()};
  const moveTask=(id,dir)=>{const idx=tasks.findIndex(t=>t.id===id);if(idx<0)return;const swap=idx+dir;if(swap<0||swap>=tasks.length)return;const nt=[...tasks];[nt[idx],nt[swap]]=[nt[swap],nt[idx]];persist(nt)};
  // Context: which project is currently open (for auto-assign in QuickAdd)
  const ctxProject=view.tab==='project'?(prjById(view.prjId)||null):null;

  if(!ready)return<div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12,color:'#a8a29e'}}><span style={{fontSize:56}}>🧠</span><span style={{fontSize:14,fontWeight:600}}>Loading…</span></div>;

  // Computed
  const active=tasks.filter(t=>t.status!=='archived'&&t.status!=='completed');
  const inbox=active.filter(t=>!t.project).sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  const td=todayISO();
  const todayTasks=sortDP(active.filter(t=>t.dueDate===td));
  const overdueTasks=sortDP(active.filter(t=>isOverdue(t.dueDate)));
  const upcomingTasks=sortDP(active.filter(t=>t.dueDate&&t.dueDate>td&&withinN(t.dueDate,7)));
  const doneTasks=tasks.filter(t=>t.status==='completed').sort((a,b)=>(b.completedAt||'').localeCompare(a.completedAt||''));
  const archivedTasks=tasks.filter(t=>t.status==='archived');
  const goals=active.filter(t=>t.goalType);
  const prjById=id=>projects.find(p=>p.id===id)||projects.find(p=>p.name===id);
  const prjTasks=id=>sortDP(active.filter(t=>t.project===id||t.project===(prjById(id)||{}).name));
  const searchResults=searchQ.length>=2?tasks.filter(t=>t.status!=='archived'&&t.text.toLowerCase().includes(searchQ.toLowerCase())).slice(0,40):[];
  const inboxN=inbox.length;
  const todayN=todayTasks.length+overdueTasks.length;
  const scheduledAll=sortDP(active.filter(t=>t.dueDate));
  const selPool=(()=>{
    if(view.tab==='inbox')return inbox.map(t=>t.id);
    if(view.tab==='today')return [...overdueTasks,...todayTasks,...upcomingTasks].map(t=>t.id);
    if(view.tab==='scheduled')return scheduledAll.map(t=>t.id);
    if(view.tab==='project')return prjTasks(view.prjId).map(t=>t.id);
    if(view.tab==='label')return active.filter(t=>(t.labels||[]).includes(view.lbl)).map(t=>t.id);
    return[];
  })();

  const nav=(tab,extra={})=>{setView({tab,...extra});exitSelect()};

  return(
    <div style={{position:'fixed',inset:0,display:'flex',flexDirection:'column',background:'#F7F7F5'}}>
      {toast&&<div className="fixed top-4 left-4 right-4 z-50 bg-stone-900 text-white text-sm font-bold px-4 py-3 rounded-2xl text-center shadow-xl">{toast}</div>}

      {/* Main content */}
      <div className="flex-1 overflow-y-auto">
        {view.tab==='today'   &&<TodayView overdue={overdueTasks} today={todayTasks} upcoming={upcomingTasks} onComplete={complete} onEdit={setEditTask} onToggleSub={toggleSub} projects={projects} selectMode={selectMode} setSelectMode={setSelectMode} selected={selected} onSelect={toggleSel} onMove={moveTask}/>}
        {view.tab==='inbox'   &&<InboxView tasks={inbox} onComplete={complete} onEdit={setEditTask} onToggleSub={toggleSub} labels={labels} projects={projects} selectMode={selectMode} setSelectMode={setSelectMode} selected={selected} onSelect={toggleSel} onMove={moveTask}/>}
        {view.tab==='browse'  &&<BrowseView projects={projects} labels={labels} tasks={active} goals={goals} doneTasks={doneTasks} archivedTasks={archivedTasks} onNav={nav} onEdit={setEditTask} onSavePrjs={persistPrjs}/>}
        {view.tab==='web'     &&<WebView tasks={active} labels={labels} projects={projects} onEdit={setEditTask} onComplete={complete}/>}
        {view.tab==='project' &&<ProjectView prj={prjById(view.prjId)} tasks={prjTasks(view.prjId)} onComplete={complete} onEdit={setEditTask} onToggleSub={toggleSub} onBack={()=>nav('browse')} onNav={nav} labels={labels} projects={projects} selectMode={selectMode} setSelectMode={setSelectMode} selected={selected} onSelect={toggleSel} onMove={moveTask}/>}
        {view.tab==='label'   &&<LabelView lbl={view.lbl} tasks={active.filter(t=>(t.labels||[]).includes(view.lbl))} onComplete={complete} onEdit={setEditTask} onToggleSub={toggleSub} onBack={()=>nav('browse')} labels={labels} projects={projects} selectMode={selectMode} setSelectMode={setSelectMode} selected={selected} onSelect={toggleSel}/>}
        {view.tab==='search'  &&<SearchView q={searchQ} setQ={setSearchQ} results={searchResults} onComplete={complete} onEdit={setEditTask} onToggleSub={toggleSub} labels={labels} projects={projects}/>}
        {view.tab==='scheduled'&&<ScheduledView tasks={scheduledAll} onComplete={complete} onEdit={setEditTask} onToggleSub={toggleSub} projects={projects} labels={labels} selectMode={selectMode} setSelectMode={setSelectMode} selected={selected} onSelect={toggleSel}/>}
        {view.tab==='goals'   &&<GoalsView goals={goals} allTasks={active} doneTasks={doneTasks.filter(t=>t.goalType)} onEdit={setEditTask} onComplete={complete} labels={labels} projects={projects} onSave={saveEdit} onAdd={addTask}/>}
        {view.tab==='done'    &&<DoneView done={doneTasks} arch={archivedTasks} onUndo={uncomplete} onRestore={restore} onDel={del}/>}
        {view.tab==='settings'&&<SettingsView cid={gcalCid} setCid={v=>{setGcalCid(v);ls.set('gcal_cid',v)}} connected={gcalOk} driveOk={driveOk} onConnect={()=>gcal.connect(true)} onDisconnect={()=>{setGcalOk(false);setDriveOk(false);_tok=null;ls.set('tok',null);ls.set('drv_stable_fid',null)}} onRetryDrive={runDriveSync} onSync={syncAll} syncing={syncing} labels={labels} onSaveLbls={persistLbls} projects={projects} onSavePrjs={persistPrjs} taskCount={tasks.length} tasks={tasks} onExport={exportJSON} onImport={importJSON}/>}
      </div>

      {/* Project move modal (bulk) */}
      {showPrjMove&&(
        <div className="fixed inset-0 z-50 flex items-end">
          <div className="absolute inset-0 bg-black/50" onClick={()=>setShowPrjMove(false)}/>
          <div className="relative bg-white rounded-t-3xl p-5 w-full max-h-96 overflow-y-auto">
            <p className="text-sm font-black text-stone-800 mb-3">📁 Move {selected.length} task{selected.length!==1?'s':''} to project</p>
            <button onClick={()=>moveSelToProject(null)} className="w-full text-left py-2.5 px-3 rounded-xl mb-1 bg-stone-50 text-sm font-semibold text-stone-600">📥 Inbox (no project)</button>
            {prjTree(projects).map(p=>(
              <button key={p.id} onClick={()=>moveSelToProject(p.name)} className="w-full text-left py-2.5 px-3 rounded-xl mb-1 text-sm font-semibold text-white" style={{background:p.color||'#6366f1',marginLeft:p.depth*12}}>
                {p.depth>0?'↳ ':''}{p.name}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Label assign modal (bulk) */}
      {showLblAssign&&(
        <div className="fixed inset-0 z-50 flex items-end">
          <div className="absolute inset-0 bg-black/50" onClick={()=>setShowLblAssign(false)}/>
          <div className="relative bg-white rounded-t-3xl p-5 w-full">
            <p className="text-sm font-black text-stone-800 mb-3">🏷️ Assign labels to {selected.length} tasks</p>
            <LblPicker labels={labels} onConfirm={assignLabels} onClose={()=>setShowLblAssign(false)}/>
          </div>
        </div>
      )}

      {/* FAB */}
      {!showQuickAdd&&!selectMode&&(
        <button onClick={()=>setShowQuickAdd(true)} className="fixed z-30 bg-emerald-600 text-white shadow-2xl active:bg-emerald-700 flex items-center justify-center" style={{right:20,bottom:80,width:56,height:56,borderRadius:'50%',fontSize:28,lineHeight:1}}>+</button>
      )}

      {/* Bulk select action bar */}
      {selectMode&&(
        <div className="bg-white border-t border-stone-100 px-3 py-2 flex gap-2 items-center flex-shrink-0" style={{overflowX:'auto',scrollbarWidth:'none'}}>
          <span className="text-xs font-bold text-stone-500 flex-shrink-0">{selected.length} sel</span>
          <button onClick={()=>setSelected([...selPool])} className="text-xs bg-stone-100 text-stone-600 px-2.5 py-1.5 rounded-xl font-semibold flex-shrink-0">All</button>
          <button onClick={()=>setSelected([])} className="text-xs bg-stone-100 text-stone-600 px-2.5 py-1.5 rounded-xl font-semibold flex-shrink-0">None</button>
          <button onClick={copySelected} disabled={!selected.length} className="text-xs bg-emerald-100 text-emerald-700 px-2.5 py-1.5 rounded-xl font-bold flex-shrink-0 disabled:opacity-40">📋</button>
          <button onClick={()=>selected.length&&setShowLblAssign(true)} disabled={!selected.length} className="text-xs bg-amber-50 text-amber-700 px-2.5 py-1.5 rounded-xl font-bold flex-shrink-0 disabled:opacity-40">🏷️</button>
          <button onClick={()=>selected.length&&setShowPrjMove(true)} disabled={!selected.length} className="text-xs bg-indigo-50 text-indigo-700 px-2.5 py-1.5 rounded-xl font-bold flex-shrink-0 disabled:opacity-40">📁 Move</button>
          <button onClick={archiveSel} disabled={!selected.length} className="text-xs bg-stone-100 text-stone-600 px-2.5 py-1.5 rounded-xl font-semibold flex-shrink-0 disabled:opacity-40">📦</button>
          <button onClick={deleteSel} disabled={!selected.length} className="text-xs bg-red-50 text-red-500 px-2.5 py-1.5 rounded-xl font-semibold flex-shrink-0 disabled:opacity-40">🗑️</button>
          <button onClick={exitSelect} className="text-xs bg-stone-800 text-white px-2.5 py-1.5 rounded-xl font-bold flex-shrink-0 ml-auto">✕ Done</button>
        </div>
      )}

      {/* Bottom nav */}
      <nav className="bg-white border-t border-stone-100 flex justify-around items-center px-1 flex-shrink-0" style={{paddingTop:8,paddingBottom:10}}>
        {[{k:'today',e:'🏠',l:'Today',n:todayN},{k:'inbox',e:'📥',l:'Inbox',n:inboxN},{k:'browse',e:'📁',l:'Browse'},{k:'search',e:'🔍',l:'Search'},{k:'settings',e:'⚙️',l:'More'}].map(({k,e,l,n})=>(
          <button key={k} onClick={()=>nav(k)} className={'relative flex flex-col items-center gap-0.5 px-2 py-0.5 rounded-xl '+(view.tab===k?'text-emerald-600':'text-stone-400')}>
            <span style={{fontSize:20,lineHeight:1}}>{e}</span>
            <span style={{fontSize:9,fontWeight:700}}>{l}</span>
            {n>0&&<span className="absolute bg-red-500 text-white font-bold rounded-full flex items-center justify-center" style={{fontSize:8,minWidth:13,height:13,padding:'0 2px',top:-2,right:-2}}>{n>99?'99+':n}</span>}
          </button>
        ))}
      </nav>

      {/* Quick Add */}
      {showQuickAdd&&<QuickAdd onAdd={addTask} onClose={()=>setShowQuickAdd(false)} projects={projects} labels={labels} ctxProject={ctxProject}/>}
      {/* Task Edit Modal */}
      {editTask&&<TaskModal task={editTask} labels={labels} projects={projects} allTasks={tasks} gcalOk={gcalOk} onSave={saveEdit} onClose={()=>setEditTask(null)} onDel={()=>{del(editTask.id);setEditTask(null)}} onArch={()=>{archive(editTask.id);setEditTask(null)}} onAddLbl={l=>persistLbls([...labels,l])} onAddPrj={p=>persistPrjs([...projects,p])}/>}
    </div>
  );
}

/* ── Task Row ────────────────────────────────────────── */
function TaskRow({task,onComplete,onEdit,onToggleSub,projects,labels,showProject,showCreated,selectMode,isSelected,onSelect,onMoveUp,onMoveDown}){
  const [expanded,setExpanded]=useState(false);
  const done=task.status==='completed';
  const ep=effPri(task);
  const auto=!task.priority&&daysOver(task.dueDate)>=1;
  const subs=task.subtasks||[];
  const doneSubs=subs.filter(s=>s.done).length;
  const prj=task.project?projects.find(p=>p.name===task.project||p.id===task.project):null;
  const circleColor=ep?PRI_COLOR[ep]:'#d1d5db';
  const handleRowClick=()=>selectMode?onSelect&&onSelect(task.id):!done&&onEdit(task);
  const fmtCreatedShort=iso=>{if(!iso)return'';const d=new Date(iso);const now=new Date();const diff=Math.floor((now-d)/864e5);if(diff===0)return'Today '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});if(diff===1)return'Yesterday';if(diff<7)return diff+'d ago';return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})};

  return(
    <div className={'bg-white '+(done?'opacity-60':'')+(isSelected?' bg-emerald-50':'')}>
      <div className="flex gap-3 px-4 py-3" onClick={handleRowClick}>
        {/* Priority circle / select checkbox */}
        {selectMode?(
          <div className={'mt-0.5 w-5 h-5 rounded border-2 flex-shrink-0 flex items-center justify-center '+(isSelected?'bg-emerald-500 border-emerald-500':'border-stone-300')}>
            {isSelected&&<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
          </div>
        ):(
        <button onClick={ev=>{ev.stopPropagation();onComplete(task.id)}}
          className="mt-0.5 w-5 h-5 rounded-full flex-shrink-0 flex items-center justify-center transition-all"
          style={{border:'2px solid '+circleColor,background:done?circleColor:'transparent'}}>
          {done&&<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
        </button>
        )}
        <div className="flex-1 min-w-0">
          <p className={'text-sm leading-snug text-stone-800 '+(done?'line-through text-stone-400':'')}>{task.text}</p>
          <div className="flex flex-wrap items-center gap-2 mt-1">
            {task.dueDate&&(
              <span className={'text-[11px] font-semibold '+(isOverdue(task.dueDate)&&!done?'text-red-500':task.dueDate===todayISO()?'text-emerald-600':'text-stone-400')}>
                📅 {fmtDate(task.dueDate)}{auto&&!done?' ⬆':''}
              </span>
            )}
            {showProject&&prj&&<span className="text-[11px] font-semibold" style={{color:prj.color}}>● {prj.name}</span>}
            {(task.labels||[]).slice(0,2).map(l=><span key={l} className="text-[10px] text-stone-400">#{l}</span>)}
            {task.recurring&&<span className="text-[10px] text-teal-500">🔄</span>}
            {task.goalType&&<span className="text-[10px] text-purple-500">⭐</span>}
            {showCreated&&task.createdAt&&<span className="text-[10px] text-stone-300">🕐 {fmtCreatedShort(task.createdAt)}</span>}
          </div>
          {subs.length>0&&!done&&(
            <button onClick={ev=>{ev.stopPropagation();setExpanded(!expanded)}} className="flex items-center gap-1 mt-1.5 text-[10px] text-stone-400 font-semibold">
              <span>{expanded?'▾':'▸'}</span><span>{doneSubs}/{subs.length} sub-tasks</span>
            </button>
          )}
          {expanded&&(
            <div className="mt-1.5 space-y-1 ml-1">
              {subs.map(st=>(
                <div key={st.id} onClick={ev=>{ev.stopPropagation();onToggleSub&&onToggleSub(task.id,st.id)}} className="flex items-center gap-2 py-0.5 cursor-pointer">
                  <div className={'w-4 h-4 rounded-full border flex-shrink-0 flex items-center justify-center '+(st.done?'border-emerald-500 bg-emerald-500':'border-stone-300')}>
                    {st.done&&<svg width="8" height="6" viewBox="0 0 8 6" fill="none"><path d="M1 3L2.8 5L7 1" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                  </div>
                  <span className={'text-xs '+(st.done?'line-through text-stone-400':'text-stone-600')}>{st.text}</span>
                </div>
              ))}
            </div>
          )}
        </div>
        {/* Reorder arrows — only show when neither selectMode nor done */}
        {(onMoveUp||onMoveDown)&&!selectMode&&!done&&(
          <div className="flex flex-col gap-0.5 flex-shrink-0 ml-1 justify-center">
            <button onClick={ev=>{ev.stopPropagation();onMoveUp&&onMoveUp()}} disabled={!onMoveUp} className="text-stone-200 text-xs disabled:opacity-0 active:text-stone-500 leading-none py-0.5">▲</button>
            <button onClick={ev=>{ev.stopPropagation();onMoveDown&&onMoveDown()}} disabled={!onMoveDown} className="text-stone-200 text-xs disabled:opacity-0 active:text-stone-500 leading-none py-0.5">▼</button>
          </div>
        )}
      </div>
      <div className="ml-16 h-px bg-stone-100"/>
    </div>
  );
}

/* ── Today View ─────────────────────────────────────── */
function TodayView({overdue,today,upcoming,onComplete,onEdit,onToggleSub,projects,selectMode,setSelectMode,selected,onSelect,onMove}){
  const [showUpcoming,setShowUpcoming]=useState(true);
  const dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const now=new Date();
  const allToday=[...overdue,...today];
  return(
    <div className="pb-24">
      <div className="px-4 pt-5 pb-4 flex items-center justify-between">
        <div><p className="text-xs font-semibold text-stone-400 uppercase tracking-widest">{dayNames[now.getDay()]}</p><h2 className="text-3xl font-black text-stone-900">Today</h2><p className="text-sm text-stone-400 mt-0.5">{now.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</p></div>
        {(allToday.length+upcoming.length)>0&&<button onClick={()=>setSelectMode&&setSelectMode(!selectMode)} className={'text-xs font-bold px-3 py-1.5 rounded-xl border flex-shrink-0 '+(selectMode?'bg-stone-800 text-white border-stone-800':'bg-white text-stone-500 border-stone-200')}>{selectMode?'✕':'Select'}</button>}
      </div>
      {overdue.length===0&&today.length===0&&<div className="text-center py-12 px-8"><div style={{fontSize:48}} className="mb-3">🎉</div><p className="text-base font-bold text-stone-600">All caught up!</p><p className="text-sm text-stone-400 mt-1">No tasks due today</p></div>}
      {overdue.length>0&&(
        <div className="mb-2">
          <div className="px-4 py-2 flex items-center gap-2"><span className="text-xs font-black text-red-500 uppercase tracking-widest">🔴 Overdue ({overdue.length})</span></div>
          {overdue.map((t,i)=><TaskRow key={t.id} task={t} onComplete={onComplete} onEdit={onEdit} onToggleSub={onToggleSub} projects={projects} showProject selectMode={selectMode} isSelected={selected&&selected.includes(t.id)} onSelect={onSelect} onMoveUp={i>0?()=>onMove&&onMove(t.id,-1):null} onMoveDown={i<overdue.length-1?()=>onMove&&onMove(t.id,1):null}/>)}
        </div>
      )}
      {today.length>0&&(
        <div className="mb-2">
          <div className="px-4 py-2"><span className="text-xs font-black text-emerald-600 uppercase tracking-widest">📌 Today ({today.length})</span></div>
          {today.map((t,i)=><TaskRow key={t.id} task={t} onComplete={onComplete} onEdit={onEdit} onToggleSub={onToggleSub} projects={projects} showProject selectMode={selectMode} isSelected={selected&&selected.includes(t.id)} onSelect={onSelect} onMoveUp={i>0?()=>onMove&&onMove(t.id,-1):null} onMoveDown={i<today.length-1?()=>onMove&&onMove(t.id,1):null}/>)}
        </div>
      )}
      {upcoming.length>0&&(
        <div className="mb-2">
          <button onClick={()=>setShowUpcoming(!showUpcoming)} className="w-full px-4 py-2 flex items-center justify-between text-xs font-black text-stone-400 uppercase tracking-widest">
            <span>📅 Upcoming ({upcoming.length})</span><span>{showUpcoming?'▾':'▸'}</span>
          </button>
          {showUpcoming&&upcoming.map(t=><TaskRow key={t.id} task={t} onComplete={onComplete} onEdit={onEdit} onToggleSub={onToggleSub} projects={projects} showProject selectMode={selectMode} isSelected={selected&&selected.includes(t.id)} onSelect={onSelect}/>)}
        </div>
      )}
    </div>
  );
}

/* ── Inbox View ─────────────────────────────────────── */
function InboxView({tasks,onComplete,onEdit,onToggleSub,labels,projects,selectMode,setSelectMode,selected,onSelect,onMove}){
  return(
    <div className="pb-24">
      <div className="px-4 pt-5 pb-4 flex items-center justify-between">
        <div><h2 className="text-3xl font-black text-stone-900">Inbox</h2><p className="text-sm text-stone-400 mt-0.5">Tasks without a project — newest first</p></div>
        {tasks.length>0&&<button onClick={()=>setSelectMode&&setSelectMode(!selectMode)} className={'text-xs font-bold px-3 py-1.5 rounded-xl border flex-shrink-0 '+(selectMode?'bg-stone-800 text-white border-stone-800':'bg-white text-stone-500 border-stone-200')}>{selectMode?'✕':'Select'}</button>}
      </div>
      {!tasks.length&&<div className="text-center py-12"><div style={{fontSize:48}}>📭</div><p className="text-base font-bold text-stone-600 mt-3">Inbox zero!</p><p className="text-sm text-stone-400 mt-1">Tap + to add tasks</p></div>}
      {tasks.map((t,i)=><TaskRow key={t.id} task={t} onComplete={onComplete} onEdit={onEdit} onToggleSub={onToggleSub} projects={projects} selectMode={selectMode} isSelected={selected&&selected.includes(t.id)} onSelect={onSelect} showCreated onMoveUp={i>0?()=>onMove&&onMove(t.id,-1):null} onMoveDown={i<tasks.length-1?()=>onMove&&onMove(t.id,1):null}/>)}
    </div>
  );
}

/* ── Browse View ─────────────────────────────────────── */
function BrowseView({projects,labels,tasks,goals,doneTasks,archivedTasks,onNav,onEdit,onSavePrjs}){
  const prjCount=p=>tasks.filter(t=>t.project===p.name||t.project===p.id).length;
  const lblCount=l=>tasks.filter(t=>(t.labels||[]).includes(l)).length;
  const tree=prjTree(projects);
  const childCount=pid=>projects.filter(p=>p.parentId===pid).length;
  const [menu,setMenu]=useState(null); // project object whose menu is open
  const [confirmDel,setConfirmDel]=useState(null);
  const dupPrj=p=>{const n={...p,id:uid(),name:p.name+' Copy',parentId:p.parentId||null};onSavePrjs&&onSavePrjs([...projects,n]);setMenu(null)};
  const delPrj=p=>{onSavePrjs&&onSavePrjs(projects.filter(x=>x.id!==p.id).map(x=>x.parentId===p.id?{...x,parentId:p.parentId||null}:x));setConfirmDel(null);setMenu(null)};
  return(
    <div className="pb-24">
      {/* Project ⋮ menu bottom sheet */}

/* ── 🕸️ Web of Thoughts View ────────────────────────── */
function WebView({tasks,labels,projects,onEdit,onComplete}){
  const [focus,setFocus]=useState(null); // 'p:<id>' or 'l:<label>'
  const prjById=id=>projects.find(p=>p.id===id)||projects.find(p=>p.name===id);
  const usedLbls=labels.filter(l=>tasks.some(t=>(t.labels||[]).includes(l)));
  const usedPrjs=projects.filter(p=>tasks.some(t=>t.project===p.name||t.project===p.id));
  const focusPrj=focus&&focus.startsWith('p:')?prjById(focus.slice(2)):null;
  const focusTasks=focus?sortDP(tasks.filter(t=>{if(focus.startsWith('p:'))return t.project===focus.slice(2)||t.project===(focusPrj&&focusPrj.name);return(t.labels||[]).includes(focus.slice(2))})):[];

  return(
    <div className="pb-24">
      <div className="px-4 pt-5 pb-4">
        <h2 className="text-3xl font-black text-stone-900">🕸️ Web of Thoughts</h2>
        <p className="text-sm text-stone-400 mt-0.5">Tap a cluster to explore connections between dumps</p>
      </div>

      {/* Focused cluster view */}
      {focus&&(
        <div className="px-4">
          <button onClick={()=>setFocus(null)} className="text-xs text-emerald-600 font-black mb-3 flex items-center gap-1">← All clusters</button>
          <div className="bg-emerald-50 border-2 border-emerald-200 rounded-2xl p-3 mb-3">
            <p className="text-sm font-black text-emerald-800">{focus.startsWith('p:')?('📁 '+(focusPrj?focusPrj.name:focus.slice(2))):('# '+focus.slice(2))}</p>
            <p className="text-xs text-emerald-600 mt-0.5">{focusTasks.length} thought{focusTasks.length!==1?'s':''} connected here</p>
          </div>
          {!focusTasks.length&&<div className="text-center py-10"><div style={{fontSize:40}}>🕸️</div><p className="text-sm font-bold text-stone-500 mt-2">No thoughts here yet</p></div>}
          {focusTasks.map(t=>{
            const tPrj=t.project?prjById(t.project):null;
            const otherLbls=(t.labels||[]).filter(l=>focus!==('l:'+l));
            const otherProjKey=tPrj&&focus!==('p:'+(tPrj.id||tPrj.name))?(tPrj.id||tPrj.name):null;
            return(
              <div key={t.id} className="bg-white rounded-2xl border border-stone-100 p-3 mb-2.5 shadow-sm" onClick={()=>onEdit(t)}>
                <div className="flex items-start gap-2">
                  <button onClick={ev=>{ev.stopPropagation();onComplete(t.id)}} className={'mt-0.5 w-4 h-4 rounded-full border-2 flex-shrink-0 '+(t.status==='completed'?'bg-emerald-500 border-emerald-500':'border-stone-300')}/>
                  <p className={'text-sm leading-snug flex-1 '+(t.status==='completed'?'line-through text-stone-400':'text-stone-800')}>{t.text}</p>
                </div>
                {t.dueDate&&<p className="text-[10px] text-emerald-600 mt-1 ml-6">📅 {fmtDate(t.dueDate)}</p>}
                {(otherLbls.length>0||otherProjKey)&&(
                  <div className="flex gap-1.5 mt-2 flex-wrap items-center ml-6">
                    <span className="text-[10px] text-stone-400">🔗</span>
                    {otherProjKey&&<button onClick={ev=>{ev.stopPropagation();setFocus('p:'+otherProjKey)}} className="text-[10px] px-2 py-0.5 rounded-full font-semibold text-white" style={{background:tPrj.color||'#6366f1'}}>📁 {tPrj.name}</button>}
                    {otherLbls.map(l=><button key={l} onClick={ev=>{ev.stopPropagation();setFocus('l:'+l)}} className={'text-[10px] px-2 py-0.5 rounded-full font-semibold border '+lblColor(l,usedLbls)}># {l}</button>)}
                  </div>
                )}
                <p className="text-[9px] text-stone-300 mt-1.5 ml-6">Added {fmtCreated(t.createdAt)}</p>
              </div>
            );
          })}
        </div>
      )}

      {/* All clusters overview */}
      {!focus&&(
        <div className="px-4">
          {(usedPrjs.length===0&&usedLbls.length===0)&&<div className="text-center py-12"><div style={{fontSize:44}}>🕸️</div><p className="text-sm font-bold text-stone-500 mt-2">No labeled thoughts yet</p><p className="text-xs text-stone-400 mt-1">Add a #label or @project in Quick Add to see connections</p></div>}
          {usedPrjs.map(p=>{
            const key=p.id||p.name;
            const pt=tasks.filter(t=>t.project===p.name||t.project===p.id);
            const crossLinked=pt.filter(t=>(t.labels||[]).length>0);
            return(
              <div key={key} className="bg-white rounded-2xl border border-stone-100 p-3 mb-3 shadow-sm" onClick={()=>setFocus('p:'+key)}>
                <div className="flex items-center justify-between mb-2">
                  <span className="text-sm font-black" style={{color:p.color||'#6366f1'}}>📁 {p.name}</span>
                  <span className="text-xs text-stone-400">{pt.length} task{pt.length!==1?'s':''} · {crossLinked.length} cross-labeled</span>
                </div>
                <div className="flex flex-wrap gap-1">
                  {pt.slice(0,4).map(t=><span key={t.id} className="text-[10px] bg-stone-50 border border-stone-100 rounded-lg px-2 py-1 text-stone-700 truncate" style={{maxWidth:140}}>{t.text}</span>)}
                  {pt.length>4&&<span className="text-[10px] text-stone-400 px-2 py-1">+{pt.length-4}</span>}
                </div>
                {crossLinked.length>0&&<p className="text-[10px] text-stone-400 mt-1.5">🔗 Also tagged: {[...new Set(crossLinked.flatMap(t=>t.labels||[]))].slice(0,4).map(l=>'#'+l).join(' ')}</p>}
              </div>
            );
          })}
          {usedLbls.map(l=>{
            const lt=tasks.filter(t=>(t.labels||[]).includes(l));
            const crossLinked=lt.filter(t=>(t.labels||[]).length>1||t.project);
            return(
              <div key={l} className="bg-white rounded-2xl border border-stone-100 p-3 mb-3 shadow-sm" onClick={()=>setFocus('l:'+l)}>
                <div className="flex items-center justify-between mb-2">
                  <span className="text-sm font-black text-stone-700"># {l}</span>
                  <span className="text-xs text-stone-400">{lt.length} thought{lt.length!==1?'s':''} · {crossLinked.length} connected</span>
                </div>
                <div className="flex flex-wrap gap-1">
                  {lt.slice(0,5).map(t=><span key={t.id} className={'text-[10px] rounded-lg px-2 py-1 border truncate '+lblColor(l,usedLbls)} style={{maxWidth:130}}>{t.text}</span>)}
                  {lt.length>5&&<span className="text-[10px] text-stone-400 px-2 py-1">+{lt.length-5}</span>}
                </div>
                {crossLinked.length>0&&<p className="text-[10px] text-stone-400 mt-1.5">🔗 Shared with: {[...new Set(crossLinked.flatMap(t=>{const tp=t.project?prjById(t.project):null;return[...(t.labels||[]).filter(x=>x!==l),tp?('📁 '+tp.name):null].filter(Boolean)}))].slice(0,4).join(' ')}</p>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ── Project View ────────────────────────────────────── */
function ProjectView({prj,tasks,onComplete,onEdit,onToggleSub,onBack,onNav,labels,projects,selectMode,setSelectMode,selected,onSelect}){
  if(!prj)return<div className="p-8 text-center text-stone-400">Project not found</div>;
  const active=tasks.filter(t=>t.status!=='completed'&&t.status!=='archived');
  const done=tasks.filter(t=>t.status==='completed').sort((a,b)=>(b.completedAt||'').localeCompare(a.completedAt||''));
  const [showDone,setShowDone]=useState(false);
  const ancestors=prjAncestors(projects,prj.id);
  const subs=projects.filter(p=>p.parentId===prj.id);
  return(
    <div className="pb-24">
      <div className="flex items-center gap-3 px-4 pt-4 pb-2">
        <button onClick={onBack} className="text-stone-400 text-xl font-bold mr-1">‹</button>
        <span className="w-9 h-9 rounded-xl flex items-center justify-center text-white font-black text-base" style={{background:prj.color||'#6366f1'}}>{(prj.name||'?')[0].toUpperCase()}</span>
        <div className="flex-1 min-w-0">
          {ancestors.length>0&&(
            <div className="flex items-center gap-1 flex-wrap mb-0.5">
              {ancestors.map((a,i)=>(
                <React.Fragment key={a.id}>
                  <button onClick={()=>onNav&&onNav('project',{prjId:a.id})} className="text-[11px] text-stone-400 font-semibold">{a.name}</button>
                  <span className="text-[10px] text-stone-300">›</span>
                </React.Fragment>
              ))}
            </div>
          )}
          <h2 className="text-xl font-black text-stone-900 truncate">{prj.name}</h2>
        </div>
      </div>
      {subs.length>0&&(
        <div className="px-4 pb-3 flex gap-1.5 flex-wrap">
          {subs.map(s=><button key={s.id} onClick={()=>onNav&&onNav('project',{prjId:s.id})} className="text-xs font-bold px-3 py-1.5 rounded-xl border bg-white text-stone-600 border-stone-200">↳ {s.name}</button>)}
        </div>
      )}
      <p className="px-4 text-xs text-stone-400 mb-3">{active.length} task{active.length!==1?'s':''}</p>
      {active.length===0&&<div className="text-center py-12"><div style={{fontSize:40}}>✅</div><p className="text-sm font-bold text-stone-500 mt-2">All done in {prj.name}</p></div>}
      {active.map(t=><TaskRow key={t.id} task={t} onComplete={onComplete} onEdit={onEdit} onToggleSub={onToggleSub} projects={projects} selectMode={selectMode} isSelected={selected&&selected.includes(t.id)} onSelect={onSelect}/>)}
      {done.length>0&&(
        <div className="mt-2">
          <button onClick={()=>setShowDone(!showDone)} className="w-full px-4 py-2.5 flex items-center justify-between text-xs font-black text-stone-400 uppercase tracking-widest bg-white">
            <span>✅ Completed ({done.length})</span><span>{showDone?'▾':'▸'}</span>
          </button>
          {showDone&&done.slice(0,20).map(t=><TaskRow key={t.id} task={t} onComplete={onComplete} onEdit={onEdit} onToggleSub={onToggleSub} projects={projects}/>)}
        </div>
      )}
    </div>
  );
}

  const td=todayISO(),tm=addDays(1);

    {l:'🔴 Overdue',ts:tasks.filter(t=>t.dueDate<td)},
    {l:'📌 Today',ts:tasks.filter(t=>t.dueDate===td)},

                  {g.labels&&g.labels.length>0&&<p className="text-[10px] text-stone-400 mt-0.5">{g.labels.map(l=>'#'+l).join(' ')}</p>}
                </div>
                <span className="text-stone-300 text-xs mt-1">✏️</span>
              </div>
              {/* Sub-goals */}
              {subGoals(g).length>0&&(
                <div className="border-t border-stone-50 px-3 py-1">
                  {subGoals(g).map(sg=>(
                    <div key={sg.id} className="flex items-center gap-2 py-2 border-b border-stone-50 last:border-0" onClick={()=>onEdit(sg)}>
                      <button onClick={ev=>{ev.stopPropagation();onComplete(sg.id)}} className={'w-4 h-4 rounded-full border-2 flex-shrink-0 flex items-center justify-center '+(sg.status==='completed'?'bg-emerald-500 border-emerald-500':'border-stone-300')}/>
                      <div className="flex-1 min-w-0">
                        <p className={'text-xs font-semibold '+(sg.status==='completed'?'line-through text-stone-400':'text-stone-700')}>{sg.text}</p>
                        {sg.dueDate&&<p className={'text-[10px] '+(isOverdue(sg.dueDate)&&sg.status!=='completed'?'text-red-400':'text-stone-400')}>📅 {fmtDate(sg.dueDate)}</p>}
                      </div>
                    </div>
                  ))}
                </div>
              )}
              {/* Add sub-goal */}
              {addSubFor===g.id?(
                <div className="border-t border-stone-100 p-3 bg-stone-50">
                  <input value={subText} onChange={e=>setSubText(e.target.value)} placeholder="Sub-goal or target…" autoFocus className="w-full text-sm border border-stone-200 rounded-xl px-3 py-2 mb-2 bg-white focus:outline-none focus:border-emerald-400"/>
                  <div className="flex gap-2 items-center">
                    <input type="date" value={subDate} onChange={e=>setSubDate(e.target.value)} className="flex-1 text-xs border border-stone-200 rounded-xl px-2 py-1.5 bg-white focus:outline-none"/>
                    <button onClick={()=>handleAddSub(g)} disabled={!subText.trim()} className="px-3 py-1.5 bg-emerald-600 text-white rounded-xl text-xs font-bold disabled:opacity-40">Add</button>
                    <button onClick={()=>{setAddSubFor(null);setSubText('');setSubDate('')}} className="px-3 py-1.5 bg-stone-100 text-stone-600 rounded-xl text-xs">✕</button>
                  </div>
                </div>
              ):(
                <button onClick={()=>setAddSubFor(g.id)} className="w-full px-3 py-2 text-xs text-emerald-600 font-bold text-left border-t border-stone-50">+ Add sub-goal / target</button>
              )}
            </div>
          ))}
        </div>
      ):null})}
    </div>
  );
}

/* ── Quick Add ───────────────────────────────────────── */
function QuickAdd({onAdd,onClose,projects,labels,ctxProject}){
  const [text,setText]=useState('');
  const [parsed,setParsed]=useState({text:'',dueDate:null,priority:null,labels:[],project:ctxProject?ctxProject.name:null});
  const [suggs,setSuggs]=useState([]);
  const [suggMode,setSuggMode]=useState(null); // 'tag'|'project'
  const ref=useRef(null);
  useEffect(()=>{ref.current&&ref.current.focus()},[]);
  const handleChange=v=>{
    setText(v);const p=parseNL(v,projects,labels);setParsed({...p,project:p.project||(ctxProject?ctxProject.name:null)});
    const hm=v.match(/#([a-zA-Z0-9_]*)$/);
    const am=v.match(/@([a-zA-Z0-9_ ]*)$/);
    if(hm){setSuggMode('tag');setSuggs(labels.filter(l=>l.toLowerCase().startsWith(hm[1].toLowerCase())).slice(0,5))}
    else if(am){setSuggMode('project');const partial=am[1].trim().toLowerCase();const matches=partial?projects.filter(p=>p.name.toLowerCase().includes(partial)):projects;setSuggs(matches.slice(0,5))}
    else {setSuggs([]);setSuggMode(null)}
  };
  const applySugg=s=>{
    setText(prev=>{
      const nv=suggMode==='tag'?prev.replace(/#([a-zA-Z0-9_]*)$/,'#'+s+' '):prev.replace(/@([a-zA-Z0-9_ ]*)$/,'@'+s+' ');
      setParsed(parseNL(nv,projects,labels));
      return nv;
    });
    setSuggs([]);setSuggMode(null);
  };
  const handleAdd=()=>{
    if(!text.trim())return;
    const p=parseNL(text,projects,labels);
    const proj=p.project||(ctxProject?ctxProject.name:null);
    onAdd({text:p.text||text.trim(),dueDate:p.dueDate,priority:p.priority,labels:p.labels,project:proj,type:'task',status:proj?'active':'inbox'});
    onClose();
  };
  const hasMeta=parsed.dueDate||parsed.priority||parsed.labels.length>0||parsed.project||ctxProject;
  return(
    <div className="fixed inset-0 z-50 flex flex-col justify-end">
      <div className="absolute inset-0 bg-black/40" onClick={onClose}/>
      <div className="relative bg-white rounded-t-3xl px-4 pt-4 pb-8">
        <div className="flex justify-center mb-3"><div className="w-10 h-1 bg-stone-200 rounded-full"/></div>
        <p className="text-xs font-black text-stone-400 uppercase tracking-widest mb-2">Quick Add{ctxProject&&<span className="text-indigo-500 ml-2">→ {ctxProject.name}</span>}</p>
        <input ref={ref} value={text} onChange={e=>handleChange(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleAdd()} placeholder="Task name… tomorrow @Project #label p1" className="w-full text-base text-stone-900 bg-transparent border-b-2 border-stone-200 focus:border-emerald-500 focus:outline-none pb-2 mb-3 transition-colors"/>
        {suggs.length>0&&suggMode==='tag'&&(
          <div className="flex gap-1.5 flex-wrap mb-3 p-2 bg-amber-50 rounded-xl border border-amber-200">
            <span className="text-[10px] text-amber-600 w-full font-semibold">💡 Tap to complete tag:</span>
            {suggs.map(s=><button key={s} onClick={()=>applySugg(s)} className="text-xs bg-white text-amber-700 border border-amber-200 px-2 py-1 rounded-lg font-semibold">#{s}</button>)}
          </div>
        )}
        {suggs.length>0&&suggMode==='project'&&(
          <div className="flex gap-1.5 flex-wrap mb-3 p-2 bg-indigo-50 rounded-xl border border-indigo-200">
            <span className="text-[10px] text-indigo-600 w-full font-semibold">💡 Tap to complete project:</span>
            {suggs.map(p=><button key={p.id||p.name} onClick={()=>applySugg(p.name)} className="text-xs text-white px-2 py-1 rounded-lg font-semibold" style={{background:p.color||'#6366f1'}}>{p.parentId?'↳ ':'📁 '}{p.name}</button>)}
          </div>
        )}
        {/* NLP preview + context project */}
        {hasMeta&&(
          <div className="flex flex-wrap gap-2 mb-3 p-3 bg-stone-50 rounded-xl">
            {ctxProject&&!parsed.project&&<span className="text-xs font-semibold px-2 py-1 rounded-lg text-white" style={{background:ctxProject.color||'#6366f1'}}>📁 {ctxProject.name}</span>}
            {parsed.dueDate&&<span className={'text-xs font-semibold px-2 py-1 rounded-lg '+(parsed.dueDate===todayISO()?'bg-emerald-100 text-emerald-700':isOverdue(parsed.dueDate)?'bg-red-100 text-red-600':'bg-stone-200 text-stone-600')}>📅 {fmtDate(parsed.dueDate)}</span>}
            {parsed.priority&&<span className="text-xs font-semibold px-2 py-1 rounded-lg bg-stone-200 text-stone-700" style={{color:PRI_COLOR[parsed.priority]}}>● {parsed.priority}</span>}
            {parsed.project&&<span className="text-xs font-semibold px-2 py-1 rounded-lg text-white" style={{background:projects.find(p=>p.name===parsed.project)?.color||'#6366f1'}}>📁 {parsed.project}</span>}
            {parsed.labels.map(l=><span key={l} className="text-xs font-semibold px-2 py-1 rounded-lg bg-stone-200 text-stone-600"># {l}</span>)}
          </div>
        )}
        <div className="text-[11px] text-stone-400 mb-3">Tip: <span className="font-semibold text-stone-500">tomorrow</span> · <span className="font-semibold text-stone-500">@Project</span> · <span className="font-semibold text-stone-500">#label</span> · <span className="font-semibold text-stone-500">p1</span> · <span className="font-semibold text-stone-500">mon/tue/wed…</span></div>
        <button onClick={handleAdd} disabled={!text.trim()} className="w-full py-3.5 bg-emerald-600 text-white rounded-2xl font-black text-sm shadow-md active:bg-emerald-700 disabled:opacity-40">
          Add Task
        </button>
      </div>
    </div>
  );
}

/* ── Task Modal (full edit) ──────────────────────────── */
function TaskModal({task,labels,projects,allTasks,gcalOk,onSave,onClose,onDel,onArch,onAddLbl,onAddPrj}){
  const [t,setT]=useState({...task,subtasks:task.subtasks||[],goalType:task.goalType||null,notes:task.notes||''});

  const addL=()=>{const l=newLbl.trim();if(!l||labels.includes(l))return;onAddLbl(l);s('labels',[...(t.labels||[]),l]);setNewLbl('')};
  const addSub=()=>{if(!newSub.trim())return;s('subtasks',[...(t.subtasks||[]),{id:uid(),text:newSub.trim(),done:false}]);setNewSub('')};
  const togSub=i=>s('subtasks',(t.subtasks||[]).map((x,j)=>j===i?{...x,done:!x.done}:x));
  const delSub=i=>s('subtasks',(t.subtasks||[]).filter((_,j)=>j!==i));
  const related=t.labels&&t.labels.length?allTasks.filter(r=>r.id!==t.id&&!['archived','completed'].includes(r.status)&&(r.labels||[]).some(l=>(t.labels||[]).includes(l))).slice(0,4):[];
  const prj=t.project?projects.find(p=>p.name===t.project||p.id===t.project):null;
  return(
    <div className="fixed inset-0 z-50 flex flex-col justify-end">
      <div className="absolute inset-0 bg-black/50" onClick={onClose}/>
      <div className="relative bg-white rounded-t-3xl overflow-y-auto" style={{maxHeight:'94vh'}}>
        <div className="flex justify-center pt-3 pb-1"><div className="w-10 h-1.5 bg-stone-200 rounded-full"/></div>
        {/* Header row */}
        <div className="flex items-center gap-3 px-4 pb-2 pt-1">
          <div className="w-5 h-5 rounded-full flex-shrink-0 border-2" style={{borderColor:t.priority?PRI_COLOR[t.priority]:'#d1d5db'}}/>
          <span className="text-xs font-semibold" style={{color:prj?prj.color:'#9ca3af'}}>{prj?('📁 '+prj.name):'📥 Inbox'}</span>
        </div>
        <div className="px-4 pb-14">
          <textarea value={t.text} onChange={e=>s('text',e.target.value)} className="w-full text-lg font-semibold text-stone-900 bg-transparent resize-none focus:outline-none leading-relaxed" style={{minHeight:48}} rows={2}/>
          <textarea value={t.notes||''} onChange={e=>s('notes',e.target.value)} placeholder="Add notes…" className="w-full text-sm text-stone-500 bg-transparent resize-none focus:outline-none mt-1 leading-relaxed" rows={2}/>

          <div className="border-t border-stone-100 mt-3 pt-3 space-y-3">
            {/* Due date */}
            <div>
              <p className="text-[11px] font-black text-stone-400 uppercase tracking-widest mb-2">Due Date</p>
              <div className="flex flex-wrap gap-1.5 mb-2">{qd.map(({l,v})=><Chip key={l} on={t.dueDate===v&&v!==null} click={()=>s('dueDate',v)}>{l}</Chip>)}</div>
              <input type="date" value={t.dueDate||''} onChange={e=>s('dueDate',e.target.value||null)} className="w-full px-3 py-2 text-sm border border-stone-200 rounded-xl focus:outline-none bg-stone-50 text-stone-700"/>
            </div>
            {/* Priority */}
            <div>
              <p className="text-[11px] font-black text-stone-400 uppercase tracking-widest mb-2">Priority</p>
              <div className="flex gap-2">
                <button onClick={()=>s('priority',null)} className={'flex-1 py-2 rounded-xl text-xs font-bold border '+(t.priority?'bg-white text-stone-400 border-stone-200':'bg-stone-100 text-stone-600 border-stone-200')}>None</button>
                {['P1','P2','P3','P4'].map(p=>(
                  <button key={p} onClick={()=>s('priority',t.priority===p?null:p)}
                    className={'flex-1 py-2 rounded-xl text-xs font-black border '+(t.priority===p?'text-white':'bg-white border-stone-200')}
                    style={{background:t.priority===p?PRI_COLOR[p]:'',borderColor:t.priority===p?PRI_COLOR[p]:'',color:t.priority===p?'white':PRI_COLOR[p]}}>
                    {p}

                ))}

              <p className="text-[11px] font-black text-stone-400 uppercase tracking-widest mb-2">Project</p>

            <div>

              </div>
            </div>
            {/* Goal */}
            <div>
              <p className="text-[11px] font-black text-stone-400 uppercase tracking-widest mb-2">Goal Timeline</p>

                <Chip on={!t.goalType} click={()=>s('goalType',null)}>Not a Goal</Chip>

            </div>
            {/* Sub-tasks */}
            <div>
              <p className="text-[11px] font-black text-stone-400 uppercase tracking-widest mb-2">Sub-tasks ({(t.subtasks||[]).length})</p>

                  <span className={'flex-1 text-xs '+(st.done?'line-through text-stone-400':'text-stone-700')}>{st.text}</span>
                  <button onClick={()=>delSub(i)} className="text-stone-300 text-sm active:text-red-400">×</button>

              <div className="flex gap-2 mt-2">
                <input value={newSub} onChange={e=>setNewSub(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addSub()} placeholder="Add sub-task…" className="flex-1 px-3 py-2 text-xs border border-stone-200 rounded-xl focus:outline-none bg-stone-50"/>
                <button onClick={addSub} className="px-3 py-2 bg-stone-100 text-stone-600 rounded-xl text-xs font-bold">Add</button>
              </div>
            </div>
            {/* Related */}
            {related.length>0&&(
              <div>
                <p className="text-[11px] font-black text-stone-400 uppercase tracking-widest mb-2">🔗 Connected Thoughts ({related.length})</p>

              </div>
            )}
          </div>

            <button onClick={onDel}  className="px-4 py-4 bg-red-50 text-red-500 rounded-2xl text-lg">🗑️</button>
          </div>
        </div>
      </div>
    </div>
  );
}

            {driveOk&&<span className="text-xs text-stone-400">Drive + Calendar active</span>}
          </div>
          {!connected&&<React.Fragment>
            <div className="bg-stone-50 rounded-xl p-3 mb-3 text-xs text-stone-600 space-y-1">
              <p className="font-bold">Setup (once):</p>
              <p>1. console.cloud.google.com → New project</p>
              <p>2. Enable Google Calendar API</p>
              <p>3. OAuth 2.0 Client ID (Web app) + add your URL</p>
              <p>4. Paste Client ID below</p>
            </div>
            <input value={inp} onChange={e=>setInp(e.target.value)} placeholder="xxxx.apps.googleusercontent.com" className="w-full px-3 py-2.5 text-xs border border-stone-200 rounded-xl bg-stone-50 mb-2"/>
            <button onClick={()=>setCid(inp.trim())} disabled={!inp.trim()||!isHttps} className="w-full py-2.5 bg-stone-100 text-stone-700 rounded-xl text-xs font-bold disabled:opacity-40 mb-2">Save Client ID</button>
            {cid&&isHttps&&<button onClick={onConnect} className="w-full py-3 bg-emerald-600 text-white rounded-xl text-xs font-black">🔐 Sign in with Google</button>}
          </React.Fragment>}
          {connected&&!driveOk&&(
          <div className="bg-red-50 border border-red-200 rounded-xl p-3 mb-3 text-xs text-red-700 space-y-1.5">
            <p className="font-bold">⚠️ Signed in, but Drive isn't responding.</p>
            <p>Two common causes:</p>
            <p><strong>A)</strong> Google Drive API isn't enabled in your project — console.cloud.google.com → APIs & Services → Library → search "Google Drive API" → Enable.</p>
            <p><strong>B)</strong> Your saved sign-in is from before Drive access was added, so it's missing permission. Tap <strong>Reconnect</strong> below to sign in fresh.</p>
          </div>
        )}
        {connected&&!driveOk&&<button onClick={onConnect} className="w-full py-3 bg-amber-500 text-white rounded-xl text-xs font-black mb-2">🔁 Reconnect Google (grant Drive access)</button>}
        {connected&&<React.Fragment>
            <button onClick={onRetryDrive} className="w-full py-3 bg-blue-600 text-white rounded-xl text-xs font-black mb-2">🔄 Retry Drive connection</button>
            <button onClick={onSync} disabled={syncing} className="w-full py-3 bg-emerald-600 text-white rounded-xl text-xs font-black mb-2">{syncing?'⏳ Syncing…':'🔄 Force sync Calendar'}</button>
            <button onClick={onDisconnect} className="w-full py-2 bg-stone-50 text-stone-400 rounded-xl text-xs border border-stone-200">Disconnect</button>
          </React.Fragment>}
        </div>
      </div>
      {/* Projects */}
      <div className="bg-white mx-0 mb-4 border-y border-stone-100">
        <p className="px-4 pt-4 pb-2 text-xs font-black text-stone-400 uppercase tracking-widest">Projects</p>
        <p className="px-4 pb-2 text-[10px] text-stone-400">Nest as many levels as you like — e.g. Work › WWC › C3</p>
        {editPrj&&(()=>{
          const invalidIds=new Set([editPrj.id,...prjDescendantIds(projects,editPrj.id)]);
          const validParents=tree.filter(p=>!invalidIds.has(p.id));
          return(
          <div className="mx-4 mb-3 bg-stone-50 rounded-2xl p-3">
            <p className="text-xs font-bold text-stone-600 mb-2">Edit {editPrj.name}</p>
            <input value={editPrjName} onChange={e=>setEditPrjName(e.target.value)} className="w-full px-3 py-2 text-sm border border-stone-200 rounded-xl mb-2 focus:outline-none bg-white"/>
            <div className="flex gap-2 flex-wrap mb-2">{PC.map(c=><button key={c} onClick={()=>setEditPrjColor(c)} className={'w-7 h-7 rounded-full flex-shrink-0 '+(editPrjColor===c?'ring-2 ring-offset-1 ring-stone-700':'')} style={{background:c}}/>)}</div>
            <p className="text-[11px] font-bold text-stone-400 uppercase tracking-widest mb-1.5">Parent project (optional)</p>
            <div className="flex gap-1.5 flex-wrap mb-2">
              <Chip on={!editPrjParent} click={()=>setEditPrjParent(null)}>None — top level</Chip>
              {validParents.map(p=><Chip key={p.id} on={editPrjParent===p.id} click={()=>setEditPrjParent(p.id)}>{'  '.repeat(p.depth)}{p.depth>0?'↳ ':''}{p.name}</Chip>)}
            </div>
            <div className="flex gap-2">
              <button onClick={()=>{onSavePrjs(projects.map(p=>p.id===editPrj.id?{...p,name:editPrjName.trim()||p.name,color:editPrjColor,parentId:editPrjParent}:p));setEditPrj(null)}} className="flex-1 py-2 bg-emerald-600 text-white rounded-xl text-xs font-bold">Save</button>
              <button onClick={()=>setEditPrj(null)} className="px-4 py-2 bg-stone-100 text-stone-600 rounded-xl text-xs">Cancel</button>
            </div>
          </div>
          );
        })()}
        {tree.map(p=>(
          <div key={p.id||p.name} className={'flex items-center gap-3 px-4 py-3 border-b border-stone-50 '+(p.depth>0?'bg-stone-50/50':'')} style={{paddingLeft:16+p.depth*20}}>
            <span className={(p.depth>0?'w-6 h-6 rounded-lg text-xs':'w-8 h-8 rounded-xl text-sm')+' flex items-center justify-center text-white font-black flex-shrink-0'} style={{background:p.color||'#6366f1'}}>{(p.name||'?')[0]}</span>
            <span className={'flex-1 font-semibold text-stone-700 '+(p.depth>0?'text-xs text-stone-600':'text-sm')}>{p.depth>0?'↳ ':''}{p.name}</span>
            <span className="text-xs text-stone-400 mr-2">{tasks.filter(t=>t.project===p.name||t.project===p.id).length} tasks</span>
            <button onClick={()=>{setEditPrj(p);setEditPrjName(p.name);setEditPrjColor(p.color||PC[0]);setEditPrjParent(p.parentId||null)}} className="text-xs text-stone-400 font-semibold px-2 py-1 bg-stone-100 rounded-lg mr-1">Edit</button>
            <button onClick={()=>onSavePrjs(projects.filter(x=>(x.id||x.name)!==(p.id||p.name)).map(x=>x.parentId===(p.id||p.name)?{...x,parentId:p.parentId||null}:x))} className="text-red-300 font-bold text-lg active:text-red-500">×</button>
          </div>
        ))}
        <div className="px-4 py-3">
          <input value={newPrjName} onChange={e=>setNewPrjName(e.target.value)} placeholder="New project name…" className="w-full px-3 py-2 text-sm border border-stone-200 rounded-xl mb-2 focus:outline-none bg-stone-50"/>
          <div className="flex gap-2 flex-wrap mb-2">{PC.map(c=><button key={c} onClick={()=>setNewPrjColor(c)} className={'w-7 h-7 rounded-full flex-shrink-0 '+(newPrjColor===c?'ring-2 ring-offset-1 ring-stone-700':'')} style={{background:c}}/>)}</div>
          {tree.length>0&&(
            <React.Fragment>
              <p className="text-[11px] font-bold text-stone-400 uppercase tracking-widest mb-1.5">Parent project (optional — makes this a sub-project)</p>
              <div className="flex gap-1.5 flex-wrap mb-2">
                <Chip on={!newPrjParent} click={()=>setNewPrjParent(null)}>None — top level</Chip>
                {tree.map(p=><Chip key={p.id} on={newPrjParent===p.id} click={()=>setNewPrjParent(p.id)}>{p.depth>0?'↳ ':''}{p.name}</Chip>)}
              </div>
            </React.Fragment>
          )}
          <button onClick={()=>{if(newPrjName.trim()){onSavePrjs([...projects,{id:uid(),name:newPrjName.trim(),color:newPrjColor,parentId:newPrjParent}]);setNewPrjName('');setNewPrjParent(null)}}} disabled={!newPrjName.trim()} className="w-full py-2.5 bg-stone-800 text-white rounded-xl text-xs font-black disabled:opacity-40">Add Project</button>
        </div>
      </div>
      {/* Labels */}
      <div className="bg-white mx-0 mb-4 border-y border-stone-100">
        <p className="px-4 pt-4 pb-2 text-xs font-black text-stone-400 uppercase tracking-widest">Labels</p>
        <div className="flex flex-wrap gap-2 px-4 pb-3">
          {labels.map(l=><div key={l} className="flex items-center gap-1 bg-stone-50 border border-stone-200 rounded-full pl-3 pr-1.5 py-1"><span className="text-xs font-semibold text-stone-600"># {l}</span><button onClick={()=>onSaveLbls(labels.filter(x=>x!==l))} className="text-stone-300 w-4 h-4 flex items-center justify-center" style={{fontSize:12}}>×</button></div>)}
        </div>
        <div className="flex gap-2 px-4 pb-4">
          <input value={newLbl} onChange={e=>setNewLbl(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&newLbl.trim()){onSaveLbls([...labels,newLbl.trim()]);setNewLbl('')}}} placeholder="Add label…" className="flex-1 px-3 py-2 text-xs border border-stone-200 rounded-xl focus:outline-none bg-stone-50"/>
          <button onClick={()=>{if(newLbl.trim()){onSaveLbls([...labels,newLbl.trim()]);setNewLbl('')}}} className="px-4 py-2 bg-stone-800 text-white rounded-xl text-xs font-black">Add</button>
        </div>
      </div>
      {/* Backup / Restore */}
      <div className="bg-white mx-0 mb-4 border-y border-stone-100">
        <p className="px-4 pt-4 pb-2 text-xs font-black text-stone-400 uppercase tracking-widest">Backup & Restore</p>
        <div className="px-4 pb-4 space-y-2">
          <p className="text-xs text-stone-500">{taskCount} tasks in this device · {tasks.filter(t=>t.status==='completed').length} completed</p>
          <button onClick={onExport} className="w-full py-3 bg-stone-800 text-white rounded-xl text-xs font-black active:bg-stone-900">💾 Download JSON Backup</button>
          <label className="block w-full py-3 bg-stone-100 text-stone-700 rounded-xl text-xs font-black text-center cursor-pointer active:bg-stone-200">
            📂 Restore from JSON Backup
            <input type="file" accept=".json" className="hidden" onChange={e=>onImport(e.target.files[0])}/>
          </label>
          <p className="text-[10px] text-stone-400 text-center">Always keep a backup — especially before updates</p>
        </div>
      </div>
      <div className="bg-white mx-0 border-y border-stone-100 px-4 py-4">
        <p className="text-xs font-black text-stone-400 uppercase tracking-widest mb-1">About</p>
        <p className="text-sm text-stone-600">{taskCount} total tasks · {tasks.filter(t=>t.status==='completed').length} completed</p>
        <p className="text-xs text-stone-400 mt-0.5">Data: device localStorage + Google Drive</p>
      </div>
    </div>
  );
}

/* ── Bulk Label Picker ───────────────────────────────── */
function LblPicker({labels,onConfirm,onClose}){
  const [sel,setSel]=useState([]);
  const tog=l=>setSel(s=>s.includes(l)?s.filter(x=>x!==l):[...s,l]);
  return(
    <React.Fragment>
      <div className="flex flex-wrap gap-2 mb-4">{labels.map(l=><Chip key={l} on={sel.includes(l)} click={()=>tog(l)}># {l}</Chip>)}</div>
      <div className="flex gap-2">
        <button onClick={()=>onConfirm(sel)} disabled={!sel.length} className="flex-1 py-3 bg-emerald-600 text-white rounded-xl font-bold text-sm disabled:opacity-40">Apply {sel.length} label{sel.length!==1?'s':''}</button>
        <button onClick={onClose} className="px-4 py-3 bg-stone-100 text-stone-600 rounded-xl text-sm">Cancel</button>
      </div>
    </React.Fragment>
  );
}

/* ── Tiny helpers ────────────────────────────────────── */
function Chip({on,click,children}){return<button onClick={click} className={'px-3 py-2 rounded-xl text-xs font-bold border flex-shrink-0 '+(on?'bg-emerald-600 text-white border-emerald-600':'bg-white text-stone-600 border-stone-200')}>{children}</button>}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js').catch(function(){})});}
</script>
</body>
</html>
