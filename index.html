<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo}=React;

/* ── Utilities ──────────────────────────────────────── */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const todayISO=()=>new Date().toISOString().slice(0,10);
const addDays=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)};
const nextRecur=(d,r)=>{const dt=new Date(d+'T00:00:00');if(r==='daily')dt.setDate(dt.getDate()+1);else if(r==='weekly')dt.setDate(dt.getDate()+7);else if(r==='monthly')dt.setMonth(dt.getMonth()+1);else if(r==='yearly')dt.setFullYear(dt.getFullYear()+1);return dt.toISOString().slice(0,10)};
const fmtDate=d=>{if(!d)return'';if(d===todayISO())return'Today';if(d===addDays(1))return'Tomorrow';const dt=new Date(d+'T00:00:00');const diff=Math.ceil((dt-new Date(todayISO()+'T00:00:00'))/(864e5));if(diff>0&&diff<=6)return dt.toLocaleDateString('en-IN',{weekday:'short'});return dt.toLocaleDateString('en-IN',{day:'numeric',month:'short'})};
const fmtFull=d=>d?new Date(d+'T00:00:00').toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):'';
const fmtCreated=d=>d?new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short'}):'';
const fmtTime=t=>{if(!t)return'';const parts=t.split(':');const h=Number(parts[0]),m=Number(parts[1]);if(isNaN(h)||isNaN(m))return'';const ap=h>=12?'PM':'AM';const h12=h%12||12;return h12+':'+String(m).padStart(2,'0')+' '+ap};
const isOverdue=d=>!!d&&d<todayISO();
const withinN=(d,n)=>{if(!d)return false;const s=new Date(todayISO()+'T00:00:00'),e=new Date(s);e.setDate(e.getDate()+n);const dt=new Date(d+'T00:00:00');return dt>=s&&dt<=e};
const daysOver=d=>{if(!isOverdue(d))return 0;return Math.ceil((new Date(todayISO()+'T00:00:00')-new Date(d+'T00:00:00'))/(864e5))};
const effPri=t=>{if(t.priority)return t.priority;const n=daysOver(t.dueDate);if(n>=3)return'P1';if(n>=2)return'P2';if(n>=1)return'P3';return null};
const sortDP=list=>{const po={P1:1,P2:2,P3:3,P4:4};return[...list].sort((a,b)=>{const pa=po[effPri(a)]||5,pb=po[effPri(b)]||5;const da=a.dueDate||'9999',db=b.dueDate||'9999';// dated tasks: sort by date first, then priority within same date
if(da!=='9999'||db!=='9999'){if(da!==db)return da.localeCompare(db);return pa-pb}// no date: priority order
return pa-pb})};
const ls={get:(k,d=null)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}};

/* ── NLP Task Parser ────────────────────────────────── */
const WD=['sun','mon','tue','wed','thu','fri','sat'];
const nextWD=n=>{const t=new Date();t.setHours(0,0,0,0);const diff=(n-t.getDay()+7)%7||7;const d=new Date(t);d.setDate(d.getDate()+diff);return d.toISOString().slice(0,10)};
const parseNL=(raw,projects,labels)=>{
  let text=raw,dueDate=null,priority=null,lbls=[],project=null;
  // Priority: p1-p4 or !!! !! !
  const pm=text.match(/\bp([1-4])\b/i);if(pm){priority='P'+pm[1];text=text.replace(pm[0],'').trim()}
  if(!priority){const em=text.match(/!!!|!!|!/);if(em){priority=em[0]==='!!!'?'P1':em[0]==='!!'?'P2':'P3';text=text.replace(em[0],'').trim()}}
  // Labels: #tag
  const tr=/#([a-zA-Z0-9_]+)/g;let m;while((m=tr.exec(raw))!==null)lbls.push(m[1]);text=text.replace(/#[a-zA-Z0-9_]+/g,'').trim();
  // Project: @name
  const atIdx=text.indexOf('@');
  if(atIdx!==-1){
    const after=text.slice(atIdx+1);
    const sorted=[...projects].sort((a,b)=>b.name.length-a.name.length);
    const match=sorted.find(p=>after.toLowerCase().startsWith(p.name.toLowerCase()));
    if(match){project=match.name;text=(text.slice(0,atIdx)+after.slice(match.name.length)).replace(/\s+/g,' ').trim()}
    else{const wm=after.match(/^([a-zA-Z0-9_]+)/);if(wm){const pn=projects.find(p=>p.name.toLowerCase()===wm[1].toLowerCase());if(pn){project=pn.name;text=(text.slice(0,atIdx)+after.slice(wm[1].length)).replace(/\s+/g,' ').trim()}}}
  }
  // Dates
  if(/\btoday\b/i.test(text)){dueDate=todayISO();text=text.replace(/\btoday\b/i,'').trim()}
  else if(/\b(tomorrow|tmrw|tmr)\b/i.test(text)){dueDate=addDays(1);text=text.replace(/\b(tomorrow|tmrw|tmr)\b/i,'').trim()}
  else if(/\bnext week\b/i.test(text)){dueDate=addDays(7);text=text.replace(/\bnext week\b/i,'').trim()}
  else if(/\bnext month\b/i.test(text)){dueDate=addDays(30);text=text.replace(/\bnext month\b/i,'').trim()}
  else{for(let i=0;i<7;i++){const re=new RegExp('\\b'+WD[i],'i');if(re.test(text)&&!dueDate){dueDate=nextWD(i);text=text.replace(re,'').trim();break}}}
  if(!dueDate){const inM=text.match(/\bin (\d+) (day|week|month)s?\b/i);if(inM){const n=parseInt(inM[1]),u=inM[2].toLowerCase();dueDate=u==='day'?addDays(n):u==='week'?addDays(n*7):addDays(n*30);text=text.replace(inM[0],'').trim()}}
  // Time: "3pm", "3:30pm", "15:30", "at 9am"
  let dueTime=null;
  const tm=text.match(/\b(?:at\s+)?(\d{1,2})(?::(\d{2}))?\s*(am|pm)\b/i);
  if(tm){let h=parseInt(tm[1]);const mi=tm[2]?parseInt(tm[2]):0;const ap=tm[3].toLowerCase();if(ap==='pm'&&h<12)h+=12;if(ap==='am'&&h===12)h=0;dueTime=String(h).padStart(2,'0')+':'+String(mi).padStart(2,'0');text=text.replace(tm[0],'').trim()}
  else{const tm24=text.match(/\b([01]?\d|2[0-3]):([0-5]\d)\b/);if(tm24){dueTime=String(parseInt(tm24[1])).padStart(2,'0')+':'+tm24[2];text=text.replace(tm24[0],'').trim()}}
  text=text.replace(/\s+/g,' ').trim();
  return{text:text||raw.trim(),dueDate,dueTime,priority,labels:lbls,project};
};

/* ── Google + Drive ─────────────────────────────────── */
const GCAL='https://www.googleapis.com/calendar/v3';
const DAPI='https://www.googleapis.com/drive/v3';

let _tc=null,_tok=null,_tokExp=0,_refreshTimer=null,_onOk=null;
let _onAuthFail=null;
const gcal={
  setAuthFailHandler(fn){_onAuthFail=fn},
  init(cid,onOk){
    if(!window.google?.accounts?.oauth2)return false;
    _onOk=onOk;
    _tc=window.google.accounts.oauth2.initTokenClient({
      client_id:cid,
      scope:'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/drive.appdata',
      callback:r=>{
        if(r.access_token){
          _tok=r.access_token;
          _tokExp=Date.now()+((r.expires_in||3300)*1000);
          ls.set('tok',_tok);ls.set('tok_exp',_tokExp);
          gcal._scheduleRefresh();
          _onOk&&_onOk();
        }
      },
      error_callback:()=>{
        // A silent refresh genuinely failed (revoked access, or fully signed out of Google in this browser) — only now do we need an interactive reconnect
        _tok=null;ls.set('tok',null);
        if(_onAuthFail)_onAuthFail();
      }
    });
    const s=ls.get('tok');const exp=ls.get('tok_exp',0);
    if(s){_tok=s;_tokExp=exp;onOk();gcal._scheduleRefresh()}
    return true;
  },
  // Refresh the access token ~5min before it expires, quietly, in the background — avoids ever hitting a 401 mid-use
  _scheduleRefresh(){
    if(_refreshTimer)clearTimeout(_refreshTimer);
    const msUntil=Math.max(30000,_tokExp-Date.now()-5*60*1000);
    _refreshTimer=setTimeout(()=>{_tc&&_tc.requestAccessToken({prompt:''})},msUntil);
  },
  connect(force){_tc&&_tc.requestAccessToken({prompt:force?'consent':''})},
  invalidate(){
    // A request came back 401 — try a silent, popup-free refresh first rather than immediately kicking the user out
    if(_tc){_tc.requestAccessToken({prompt:''});return}
    _tok=null;ls.set('tok',null);if(_onAuthFail)_onAuthFail();
  },
  _h(){return{'Authorization':'Bearer '+_tok,'Content-Type':'application/json'}},
  async create(t){if(!_tok||!t.dueDate)return null;try{const r=await fetch(GCAL+'/calendars/primary/events',{method:'POST',headers:gcal._h(),body:JSON.stringify({summary:t.text,start:{date:t.dueDate},end:{date:t.dueDate},description:[t.priority&&('P: '+t.priority),(t.labels&&t.labels.length)&&('Labels: '+t.labels.join(', ')),t.project&&('Project: '+t.project)].filter(Boolean).join('\n')})});if(r.status===401){gcal.invalidate();return null}return(await r.json()).id||null}catch{return null}},
  // Returns true on success (including "already gone" 404/410) so callers can distinguish a real failure worth retrying
  async del(eid){if(!eid)return true;if(!_tok)return false;try{const r=await fetch(GCAL+'/calendars/primary/events/'+eid,{method:'DELETE',headers:gcal._h()});if(r.status===401){gcal.invalidate();return false}return r.ok||r.status===404||r.status===410}catch{return false}}
};
// FIXED: stable file name + searches old version files for recovery
const STABLE_FILE='gtd_braindump.json';
const OLD_FILES=['gtd_v5.json','gtd_v4.json','gtd_v3.json','gtd_v2.json'];
const drv={
  async _search(fname){try{const r=await fetch(DAPI+'/files?spaces=appDataFolder&q=name%3D%27'+fname+'%27&fields=files(id)',{headers:gcal._h()});if(r.status===401){gcal.invalidate();return null}if(!r.ok)return null;const d=await r.json();return(d.files&&d.files[0]&&d.files[0].id)||null}catch{return null}},
  async _read(fid){try{const r=await fetch(DAPI+'/files/'+fid+'?alt=media',{headers:gcal._h()});if(!r.ok)return null;return await r.json()}catch{return null}},
  // Save always to stable file name
  async save(data){
    if(!_tok)return false;
    try{
      // Find stable file or fall back to any existing file
      let fid=ls.get('drv_stable_fid',null);
      if(!fid){fid=await drv._search(STABLE_FILE);if(fid)ls.set('drv_stable_fid',fid)}
      const ts=Date.now();const content=JSON.stringify({...data,_ts:ts,_file:STABLE_FILE});
      const bnd='gtdfix2';
      const meta=fid?'{}':JSON.stringify({name:STABLE_FILE,parents:['appDataFolder']});
      const url='https://www.googleapis.com/upload/drive/v3/files'+(fid?'/'+fid:'')+'?uploadType=multipart';
      const body='--'+bnd+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+meta+'\r\n--'+bnd+'\r\nContent-Type: application/json\r\n\r\n'+content+'\r\n--'+bnd+'--';
      const r=await fetch(url,{method:fid?'PATCH':'POST',headers:{'Authorization':'Bearer '+_tok,'Content-Type':'multipart/related; boundary='+bnd},body});
      if(r.status===401){gcal.invalidate();return false}
      if(r.ok){const d=await r.json();if(d.id){ls.set('drv_stable_fid',d.id)};ls.set('tasks_ts',ts)}
      return r.ok;
    }catch{return false}
  },
  // Load: try stable file first, then ALL old version files (recovery)
  async load(){
    if(!_tok)return null;
    for(const fname of[STABLE_FILE,...OLD_FILES]){
      try{
        const fid=await drv._search(fname);
        if(!fid)continue;
        const data=await drv._read(fid);
        if(data&&data.tasks&&data.tasks.length>0){
          data._foundIn=fname;data._fid=fid;
          return data;
        }
      }catch{continue}
    }
    return null;
  }
};

/* ── Constants ──────────────────────────────────────── */
const PC=['#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#3b82f6','#8b5cf6','#ec4899','#78716c','#64748b'];
const PRI_COLOR={P1:'#ef4444',P2:'#f97316',P3:'#3b82f6',P4:'#9ca3af'};
const PRI_BG={P1:'bg-red-50',P2:'bg-orange-50',P3:'bg-blue-50',P4:'bg-stone-50'};
const PRI_LABEL={P1:'🔴 P1 – Priority 1',P2:'🟠 P2 – Priority 2',P3:'🔵 P3 – Priority 3',P4:'⚪ P4 – Priority 4'};
const EIS=[{k:'do',s:'Do Now',l:'Urgent + Important'},{k:'schedule',s:'Schedule',l:'Important, Not Urgent'},{k:'delegate',s:'Delegate',l:'Urgent, Not Important'},{k:'drop',s:'Drop',l:'Not Urgent/Important'}];
const RECUR_OPT={daily:'Daily',weekly:'Weekly',monthly:'Monthly',yearly:'Yearly'};
// Theme presets — each swaps the app's primary accent color scale. Semantic colors (priority, quadrants,
// due-date states, etc.) are untouched since those carry meaning independent of brand color.
const THEME_PRESETS={
  emerald:{label:'Emerald',swatch:'#059669',vars:{50:'#ecfdf5',100:'#d1fae5',200:'#a7f3d0',300:'#6ee7b7',400:'#34d399',500:'#10b981',600:'#059669',700:'#047857',800:'#065f46'}},
  indigo:{label:'Indigo',swatch:'#4f46e5',vars:{50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3'}},
  rose:{label:'Rose',swatch:'#e11d48',vars:{50:'#fff1f2',100:'#ffe4e6',200:'#fecdd3',300:'#fda4af',400:'#fb7185',500:'#f43f5e',600:'#e11d48',700:'#be123c',800:'#9f1239'}},
  amber:{label:'Amber',swatch:'#d97706',vars:{50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309',800:'#92400e'}},
  teal:{label:'Teal',swatch:'#0d9488',vars:{50:'#f0fdfa',100:'#ccfbf1',200:'#99f6e4',300:'#5eead4',400:'#2dd4bf',500:'#14b8a6',600:'#0d9488',700:'#0f766e',800:'#115e59'}},
  slate:{label:'Slate',swatch:'#334155',vars:{50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',300:'#cbd5e1',400:'#94a3b8',500:'#64748b',600:'#475569',700:'#334155',800:'#1e293b'}},
};
const EISEN_OPT={do:'Do First',schedule:'Schedule',delegate:'Delegate',eliminate:'Eliminate'};
const GOAL_TIERS=[{k:'short',l:'🎯 Short-term',s:'< 3 months'},{k:'medium',l:'📈 Medium-term',s:'3–12 months'},{k:'long',l:'🌟 Long-term',s:'1–3 years'},{k:'vlong',l:'🚀 Very Long-term',s:'3+ years'}];
const LBL_COLORS=['bg-sky-100 text-sky-700 border-sky-200','bg-amber-100 text-amber-700 border-amber-200','bg-pink-100 text-pink-700 border-pink-200','bg-purple-100 text-purple-700 border-purple-200','bg-teal-100 text-teal-700 border-teal-200','bg-rose-100 text-rose-700 border-rose-200'];
const lblColor=(l,lbls)=>{const i=Math.max(0,lbls.indexOf(l))%LBL_COLORS.length;return LBL_COLORS[i]||LBL_COLORS[0]};
// Multi-level project tree helpers
const prjDescendantIds=(projects,id)=>{const kids=projects.filter(p=>p.parentId===id);return kids.flatMap(k=>[k.id,...prjDescendantIds(projects,k.id)])};
const prjAncestors=(projects,id)=>{const p=projects.find(x=>x.id===id);if(!p||!p.parentId)return[];const parent=projects.find(x=>x.id===p.parentId);return parent?[...prjAncestors(projects,parent.id),parent]:[]};
const prjTree=(projects,parentId=null,depth=0)=>projects.filter(p=>(p.parentId||null)===parentId).flatMap(p=>[{...p,depth},...prjTree(projects,p.id,depth+1)]);
/* ── Task nesting (subtasks-as-real-tasks via parentId) ── */
const childrenOf=(id,pool)=>pool.filter(t=>t.parentId===id&&t.status!=='completed'&&t.status!=='archived');
const isDescendantOf=(ancestorId,candidateId,pool)=>{
  let cur=pool.find(t=>t.id===candidateId);const seen=new Set();
  while(cur&&cur.parentId){if(seen.has(cur.id))return false;seen.add(cur.id);if(cur.parentId===ancestorId)return true;cur=pool.find(t=>t.id===cur.parentId)}
  return false;
};
// Given a set of task ids, expand to include every descendant (any depth) — used so that e.g.
// assigning a task to an Eisenhower quadrant carries its sub-tasks along with it.
const collectWithDescendants=(ids,pool)=>{
  const result=new Set(ids);const stack=[...ids];
  while(stack.length){
    const id=stack.pop();
    pool.filter(t=>t.parentId===id).forEach(c=>{if(!result.has(c.id)){result.add(c.id);stack.push(c.id)}});
  }
  return Array.from(result);
};
// Given a view's own filtered top-level list, walk in each task's children (pulled from the fuller `pool`)
// so a task and its subtasks always render together, indented, regardless of the view's own filter.
const buildNested=(topLevelFiltered,pool,sharedSeen,expandedIds)=>{
  const rows=[];const seen=sharedSeen||new Set();
  const walk=(t,depth,orphanParent)=>{
    if(seen.has(t.id))return;seen.add(t.id);
    const kids=childrenOf(t.id,pool);
    rows.push({task:t,depth,orphanParent:orphanParent||null,childCount:kids.length});
    // Only descend into children if this task is explicitly expanded — keeps the default view minimal
    if(kids.length&&expandedIds&&expandedIds.has(t.id))kids.forEach(c=>walk(c,depth+1,null));
  };
  topLevelFiltered.filter(t=>!t.parentId).forEach(t=>walk(t,0,null));
  // A subtask whose parent doesn't happen to match this view's own filter (e.g. parent moved to a
  // different project, or has a different due date) would otherwise vanish entirely, or show with no
  // context — surface it plainly, tagged with its parent's name so it's never confusing.
  topLevelFiltered.filter(t=>t.parentId&&!seen.has(t.id)).forEach(t=>{
    const parent=pool.find(p=>p.id===t.parentId);
    walk(t,0,parent||null);
  });
  return rows;
};
// Shared row renderer for the four list-style views that support nesting/drag-to-indent.
// Sub-tasks are collapsed by default; each parent row gets its own ▸/▾ arrow to expand just that
// branch — no page-wide mode, no need to open the edit form just to peek at what's underneath.
const renderNested=(list,pool,p)=>{
  const rows=buildNested(list,pool,p.sharedSeen,p.expandedIds||new Set());
  return rows.map(({task,depth,orphanParent,childCount})=>(
    <TaskRow key={task.id} task={task} depth={depth} childCount={childCount} orphanParentText={orphanParent?orphanParent.text:null}
      isExpanded={p.expandedIds&&p.expandedIds.has(task.id)} onToggleExpand={p.onToggleExpand}
      onComplete={p.onComplete} onEdit={p.onEdit} projects={p.projects} showProject={p.showProject} showCreated={p.showCreated}
      selectMode={p.selectMode} isSelected={p.selected&&p.selected.includes(task.id)} onSelect={p.onSelect} onLongPress={p.onLongPress}
      dragId={p.dragId} hoverId={p.hoverId} onRowDown={p.onRowDown} onRowMove={p.onRowMove} onRowUp={p.onRowUp}/>
  ));
};
// Sort utility for list views — 'manual' keeps the given order (or reverses it)
const SORT_OPTS=[{k:'manual',l:'Manual'},{k:'date',l:'Date'},{k:'priority',l:'Priority'},{k:'alpha',l:'A–Z'}];
const applySort=(list,sortKey,asc)=>{
  if(sortKey==='manual')return asc?list:[...list].reverse();
  let arr=[...list];
  if(sortKey==='date')arr.sort((a,b)=>(a.dueDate||'9999-99-99').localeCompare(b.dueDate||'9999-99-99'));
  else if(sortKey==='priority'){const rank={P1:0,P2:1,P3:2,P4:3};arr.sort((a,b)=>(rank[a.priority]??4)-(rank[b.priority]??4));}
  else if(sortKey==='alpha')arr.sort((a,b)=>a.text.localeCompare(b.text));
  return asc?arr:arr.reverse();
};
function SortBtn({sortKey,asc,onChange}){
  const [open,setOpen]=useState(false);
  return(
    <div className="relative flex-shrink-0">
      <button onClick={()=>setOpen(!open)} className="text-[11px] font-bold text-stone-400 px-2 py-1 flex items-center gap-1 bg-stone-100 rounded-lg">⇅ {SORT_OPTS.find(o=>o.k===sortKey)?.l||'Manual'}</button>
      {open&&(
        <div className="absolute right-0 top-7 z-20 bg-white rounded-xl shadow-lg border border-stone-100 p-1 w-32">
          {SORT_OPTS.map(o=><button key={o.k} onClick={()=>{onChange(o.k,asc);setOpen(false)}} className={'w-full text-left px-2 py-1.5 rounded-lg text-xs font-semibold '+(sortKey===o.k?'bg-stone-100 text-stone-800':'text-stone-500')}>{o.l}</button>)}
          <div className="h-px bg-stone-100 my-1"/>
          <button onClick={()=>{onChange(sortKey,!asc);setOpen(false)}} className="w-full text-left px-2 py-1.5 rounded-lg text-xs font-semibold text-stone-500">{asc?'↑ Ascending':'↓ Descending'}</button>
        </div>
      )}
    </div>
  );
}

function ExpandAllToggle({anyExpanded,onExpandAll,onCollapseAll}){
  return(
    <button onClick={anyExpanded?onCollapseAll:onExpandAll} title={anyExpanded?'Collapse all sub-tasks':'Expand all sub-tasks'} className="text-[11px] font-bold text-stone-400 px-2 py-1 flex items-center gap-1 bg-stone-100 rounded-lg flex-shrink-0">
      {anyExpanded?'⊟ Collapse all':'⊞ Expand all'}
    </button>
  );
}

/* ── App ────────────────────────────────────────────── */
function App(){
  // State
  const [tasks,setTasks]=useState(()=>{
    const raw=ls.get('tasks',[]);
    if(ls.get('subtask_migrated_v1',false))return raw;
    // One-time migration: old subtasks were {id,text,done} living inline on the parent.
    // Convert each into a real, independent task with parentId set, so it can be dragged,
    // indented/outdented, and edited on its own — same as any other task.
    const extra=[];
    const migrated=raw.map(t=>{
      (t.subtasks||[]).forEach(st=>{
        extra.push({id:st.id||uid(),text:st.text,createdAt:t.createdAt||new Date().toISOString(),dueDate:null,dueTime:null,labels:[],project:t.project||null,sectionId:t.sectionId||null,priority:null,eisenhower:null,type:'task',status:st.done?'completed':(t.status==='inbox'?'active':t.status),completedAt:st.done?new Date().toISOString():null,calendarEventId:null,recurring:null,subtasks:[],goalType:null,parentId:t.id});
      });
      return{...t,subtasks:[]};
    });
    const all=[...migrated,...extra];
    ls.set('tasks',all);ls.set('subtask_migrated_v1',true);
    return all;
  });
  const [labels,setLabels]=useState(()=>ls.get('labels',['Personal','Work','Health','Finance']));
  const [projects,setProjects]=useState(()=>{

  const [view,setView]=useState({tab:'today',prjId:null,lbl:null}); // tab: today|inbox|browse|project|label|search|settings|goals|filters
  const [editTask,setEditTask]=useState(null);
  const [showQuickAdd,setShowQuickAdd]=useState(false);
  const [quickAddSectionId,setQuickAddSectionId]=useState(null);
  const [quickAddPrefill,setQuickAddPrefill]=useState('');

  const [searchQ,setSearchQ]=useState('');
  const [gcalCid,setGcalCid]=useState(()=>ls.get('gcal_cid',''));
  const [gcalOk,setGcalOk]=useState(false);
  const [pendingCalDel,setPendingCalDel]=useState(()=>ls.get('pendingCalDel',[]));
  const queueCalDel=eid=>{if(!eid)return;setPendingCalDel(p=>{if(p.includes(eid))return p;const n=[...p,eid];ls.set('pendingCalDel',n);return n})};
  const safeDel=eid=>{if(!eid)return;gcal.del(eid).then(ok=>{if(!ok)queueCalDel(eid)})};
  const [driveOk,setDriveOk]=useState(false);
  const [syncing,setSyncing]=useState(false);
  const [toast,setToast]=useState('');
  const [ready,setReady]=useState(false);
  const [favorites,setFavorites]=useState(()=>ls.get('favorites',[])); // array of {type:'project'|'label',id,name}
  // Theme — swaps the CSS variables driving the accent color scale

  // Mission — a rarely-edited personal constitution, kept separate from tasks

  };
  // Circle of Influence/Concern — reflective sort, deliberately separate from real tasks
  const [circleItems,setCircleItems]=useState(()=>ls.get('circleItems',[]));
  const persistCircle=items=>{

    if(gcalOk&&driveOk)drv.save({tasks,labels,projects,sections,tombstones:ls.get('tombstones',{}),mission,missionHistory,missionTs:ls.get('missionTs',0),circleItems:items,circleTs:ts,lastWeeklyReview,reviewHistory}).catch(()=>{});
  };
  // Weekly Review — a guided ritual, not just a calendar
  const [lastWeeklyReview,setLastWeeklyReview]=useState(()=>ls.get('lastWeeklyReview',null));
  const [reviewHistory,setReviewHistory]=useState(()=>ls.get('reviewHistory',[]));
  const finishWeeklyReview=notes=>{
    const now=new Date().toISOString();
    const hist=[{date:now,notes:notes||''},...reviewHistory].slice(0,30);
    setLastWeeklyReview(now);setReviewHistory(hist);ls.set('lastWeeklyReview',now);ls.set('reviewHistory',hist);
    if(gcalOk&&driveOk)drv.save({tasks,labels,projects,sections,tombstones:ls.get('tombstones',{}),mission,missionHistory,missionTs:ls.get('missionTs',0),circleItems,circleTs:ls.get('circleTs',0),lastWeeklyReview:now,reviewHistory:hist}).catch(()=>{});
  };
  const [selectMode,setSelectMode]=useState(false);
  const [selected,setSelected]=useState([]);
  const [showLblAssign,setShowLblAssign]=useState(false);
  const [showPrjMove,setShowPrjMove]=useState(false);
  const [prjMovePending,setPrjMovePending]=useState(null);
  const [showSecMove,setShowSecMove]=useState(false);
  const [sections,setSections]=useState(()=>ls.get('sections',[])); // {id,name,projectId,order,archived}
  const [undoState,setUndoState]=useState(null); // {msg,prevTasks}
  const undoTimerRef=useRef(null);
  const [customFilters,setCustomFilters]=useState(()=>ls.get('customFilters',[]));
  const persistFilters=f=>{setCustomFilters(f);ls.set('customFilters',f)};
  const [refreshing,setRefreshing]=useState(false);
  const pullY=useRef(0);
  const pulling=useRef(false);
  const scrollRef=useRef(null);

  // Init — Inbox Zero: any un-projected item older than 7 days auto-archives (not just wishes)
  useEffect(()=>{
    const co=new Date();co.setDate(co.getDate()-7);
    const t=ls.get('tasks',[]).map(t=>{
      const inInbox=!t.project&&t.status!=='archived'&&t.status!=='completed';
      if(inInbox&&t.createdAt&&new Date(t.createdAt)<co)return{...t,status:'archived',autoArchived:true};
      return t;
    });
    ls.set('tasks',t);setTasks(t);setReady(true);
  },[]);
  useEffect(()=>{
    if(!gcalCid)return;
    gcal.setAuthFailHandler(()=>{
      setGcalOk(false);setDriveOk(false);
      showToast('⚠️ Google session expired — please reconnect in Settings');
    });
    const tryInit=()=>{const ok=gcal.init(gcalCid,()=>setGcalOk(true));if(!ok)setTimeout(tryInit,500)};
    if(window.google?.accounts?.oauth2)tryInit();
    else{const id=setInterval(()=>{if(window.google?.accounts?.oauth2){clearInterval(id);tryInit()}},400);return()=>clearInterval(id)}
  },[gcalCid]);
  // Merge two devices' task lists at the task level (not "pick one whole list") so that completing a
  // task on desktop and adding a task on mobile — even close together, even offline — both survive.
  const mergeTaskLists=(local,remote,localTomb,remoteTomb)=>{
    const allTombIds=new Set([...Object.keys(localTomb||{}),...Object.keys(remoteTomb||{})]);
    const mergedTomb={};
    allTombIds.forEach(id=>{mergedTomb[id]=Math.max(localTomb?.[id]||0,remoteTomb?.[id]||0)});
    const map=new Map();
    local.forEach(t=>map.set(t.id,t));
    remote.forEach(rt=>{
      const lt=map.get(rt.id);
      if(!lt){map.set(rt.id,rt);return}
      if((rt._upd||0)>(lt._upd||0))map.set(rt.id,rt); // per-task: newer edit wins, not "whichever whole list is newer"
    });
    // A tombstone newer than a task's last edit means it was deleted after that edit — drop it either way
    const merged=Array.from(map.values()).filter(t=>!(mergedTomb[t.id]&&mergedTomb[t.id]>=(t._upd||0)));
    return{merged,mergedTomb};
  };
  const unionByKey=(a,b,keyFn)=>{
    const map=new Map();(a||[]).forEach(x=>map.set(keyFn(x),x));(b||[]).forEach(x=>{if(!map.has(keyFn(x)))map.set(keyFn(x),x)});
    return Array.from(map.values());
  };
  const runDriveSync=useCallback(async()=>{
    try{
      const driveData=await drv.load();
      const localTasks=ls.get('tasks',[]);
      const localTomb=ls.get('tombstones',{});
      const localMissionTs=ls.get('missionTs',0);
      const localCircleTs=ls.get('circleTs',0);
      if(!driveData||!driveData.tasks){
        const ok=await drv.save({tasks:localTasks,labels,projects,sections,tombstones:localTomb,mission,missionHistory,missionTs:localMissionTs,circleItems,circleTs:localCircleTs,lastWeeklyReview,reviewHistory,_ts:Date.now()});
        setDriveOk(ok);
        if(ok)showToast('☁️ '+localTasks.length+' tasks saved to Drive');
        else showToast('⚠️ Drive API may not be enabled — see Settings');
        return;
      }
      setDriveOk(true);
      const driveTasks=driveData.tasks||[];
      const remoteTomb=driveData.tombstones||{};
      const {merged,mergedTomb}=mergeTaskLists(localTasks,driveTasks,localTomb,remoteTomb);
      const mergedLabels=unionByKey(labels,driveData.labels,x=>x);
      const mergedProjects=unionByKey(projects,driveData.projects,x=>x.id||x.name);
      const mergedSections=unionByKey(sections,driveData.sections,x=>x.id);
      // Mission/Circle: whole-value-wins-by-timestamp (not union) — these are single reflective
      // documents/lists, not per-item records, so "newest edit wins" is the correct merge here.
      const remoteMissionTs=driveData.missionTs||0;
      const useMissionRemote=remoteMissionTs>localMissionTs;
      const mergedMission=useMissionRemote?(driveData.mission||''):mission;
      const mergedMissionHistory=useMissionRemote?(driveData.missionHistory||[]):missionHistory;
      const mergedMissionTs=Math.max(remoteMissionTs,localMissionTs);
      const remoteCircleTs=driveData.circleTs||0;
      const useCircleRemote=remoteCircleTs>localCircleTs;
      const mergedCircle=useCircleRemote?(driveData.circleItems||[]):circleItems;
      const mergedCircleTs=Math.max(remoteCircleTs,localCircleTs);
      // Weekly review: keep whichever device's review is chronologically most recent
      const remoteReview=driveData.lastWeeklyReview||null;
      const mergedLastReview=(remoteReview&&(!lastWeeklyReview||remoteReview>lastWeeklyReview))?remoteReview:lastWeeklyReview;
      const mergedReviewHistory=unionByKey(reviewHistory,driveData.reviewHistory,x=>x.date);
      const changed=merged.length!==localTasks.length||JSON.stringify(merged)!==JSON.stringify(localTasks);
      setTasks(merged);ls.set('tasks',merged);ls.set('tasks_ts',Date.now());ls.set('tombstones',mergedTomb);
      if(mergedLabels.length!==labels.length){setLabels(mergedLabels);ls.set('labels',mergedLabels)}
      if(mergedProjects.length!==projects.length){setProjects(mergedProjects);ls.set('projects_v2',mergedProjects)}
      if(mergedSections.length!==sections.length){setSections(mergedSections);ls.set('sections',mergedSections)}
      if(useMissionRemote){setMission(mergedMission);setMissionHistory(mergedMissionHistory);ls.set('mission',mergedMission);ls.set('missionHistory',mergedMissionHistory)}
      ls.set('missionTs',mergedMissionTs);
      if(useCircleRemote){setCircleItems(mergedCircle);ls.set('circleItems',mergedCircle)}
      ls.set('circleTs',mergedCircleTs);
      if(mergedLastReview!==lastWeeklyReview){setLastWeeklyReview(mergedLastReview);ls.set('lastWeeklyReview',mergedLastReview)}
      if(mergedReviewHistory.length!==reviewHistory.length){setReviewHistory(mergedReviewHistory);ls.set('reviewHistory',mergedReviewHistory)}
      // Write the merged result straight back so both devices converge on the same state
      await drv.save({tasks:merged,labels:mergedLabels,projects:mergedProjects,sections:mergedSections,tombstones:mergedTomb,mission:mergedMission,missionHistory:mergedMissionHistory,missionTs:mergedMissionTs,circleItems:mergedCircle,circleTs:mergedCircleTs,lastWeeklyReview:mergedLastReview,reviewHistory:mergedReviewHistory,_ts:Date.now()});
      if(changed&&driveTasks.length)showToast('☁️ Synced with your other device');
    }catch(e){setDriveOk(false)}
  },[labels,projects,sections,mission,missionHistory,circleItems,lastWeeklyReview,reviewHistory]);

  const flushCalDel=async()=>{
    if(!pendingCalDel.length)return;
    const remaining=[];
    for(const eid of pendingCalDel){const ok=await gcal.del(eid);if(!ok)remaining.push(eid)}
    setPendingCalDel(remaining);ls.set('pendingCalDel',remaining);
  };
  useEffect(()=>{if(!gcalOk)return;runDriveSync();flushCalDel()},[gcalOk]);
  // Keep devices in sync automatically: re-check Drive whenever this tab/app becomes visible again
  // (e.g. switching from desktop back to your phone), and every ~40s while it stays open and visible.
  useEffect(()=>{
    if(!gcalOk)return;
    const onVis=()=>{if(document.visibilityState==='visible')runDriveSync()};
    document.addEventListener('visibilitychange',onVis);
    window.addEventListener('focus',onVis);
    const iv=setInterval(()=>{if(document.visibilityState==='visible')runDriveSync()},40000);
    return()=>{document.removeEventListener('visibilitychange',onVis);window.removeEventListener('focus',onVis);clearInterval(iv)};
  },[gcalOk,runDriveSync]);

  const showToast=(m,ms=3000)=>{setToast(m);setTimeout(()=>setToast(''),ms)};
  const persist=useCallback((t,l,p)=>{
    const fl=l||labels,fp=p||projects;
    const now=Date.now();
    const prevById=new Map(tasks.map(x=>[x.id,x]));
    // Stamp only the tasks that actually changed — this is what lets sync merge two devices' edits
    // task-by-task instead of blindly picking one whole list over the other.
    const stamped=t.map(nt=>{
      const prev=prevById.get(nt.id);
      if(!prev||JSON.stringify(prev)!==JSON.stringify(nt))return{...nt,_upd:now};
      return nt;
    });
    // Anything that existed before but is missing now was deleted — record a tombstone so the
    // deletion can propagate to the other device instead of the task quietly reappearing there.
    const newIds=new Set(stamped.map(x=>x.id));
    const deletedNow=tasks.filter(x=>!newIds.has(x.id)).map(x=>x.id);
    let tomb=ls.get('tombstones',{});
    if(deletedNow.length){tomb={...tomb};deletedNow.forEach(id=>{tomb[id]=now});ls.set('tombstones',tomb)}
    setTasks(stamped);ls.set('tasks',stamped);ls.set('tasks_ts',now);
    if(gcalOk&&driveOk)drv.save({tasks:stamped,labels:fl,projects:fp,sections,tombstones:tomb,_ts:now}).catch(()=>{});
  },[gcalOk,driveOk,labels,projects,sections,tasks]);
  const persistLbls=l=>{setLabels(l);ls.set('labels',l);if(gcalOk&&driveOk)drv.save({tasks,labels:l,projects,sections,tombstones:ls.get('tombstones',{})}).catch(()=>{})};
  const persistPrjs=p=>{setProjects(p);ls.set('projects_v2',p);if(gcalOk&&driveOk)drv.save({tasks,labels,projects:p,sections,tombstones:ls.get('tombstones',{})}).catch(()=>{})};
  const persistSections=sec=>{setSections(sec);ls.set('sections',sec);if(gcalOk&&driveOk)drv.save({tasks,labels,projects,sections:sec,tombstones:ls.get('tombstones',{})}).catch(()=>{})};
  const quickMoveSection=(taskId,sectionId)=>{pushUndo('📂 Moved task',tasks);persist(tasks.map(t=>t.id===taskId?{...t,sectionId}:t))};
  const toggleWeeklyFocus=taskId=>persist(tasks.map(t=>t.id===taskId?{...t,weeklyFocus:!t.weeklyFocus}:t));
  const bulkAssignEisenhower=(ids,quad)=>{
    if(!ids||!ids.length)return;
    const expanded=collectWithDescendants(ids,tasks);
    pushUndo('🧭 Moved '+expanded.length+' task'+(expanded.length!==1?'s':'')+' to "'+EISEN_OPT[quad]+'"'+(expanded.length>ids.length?' (incl. sub-tasks)':''),tasks);
    persist(tasks.map(t=>expanded.includes(t.id)?{...t,eisenhower:quad}:t));
  };
  // Drag a task onto another task's row to indent it as a subtask; drop it back onto its own parent's
  // row to outdent it one level (Workflowy/Todoist-style). Guards against nesting a task under its own descendant.
  const reparentTask=(draggedId,targetId)=>{
    if(draggedId===targetId)return;
    const dragged=tasks.find(t=>t.id===draggedId);
    if(!dragged)return;
    if(isDescendantOf(draggedId,targetId,tasks)){showToast("↩️ Can't nest a task under its own subtask");return}
    const target=tasks.find(t=>t.id===targetId);
    const outdenting=dragged.parentId===targetId;
    const newParentId=outdenting?(target?target.parentId||null:null):targetId;
    // When indenting, the task now "lives" wherever its new parent lives — sync section (and project,
    // in case the parent is in a different project entirely, e.g. dragged via a cross-project label view)
    // so it doesn't linger registered under its old section and render as a stray duplicate there.
    const extra=(!outdenting&&target)?{sectionId:target.sectionId||null,project:target.project||null}:{};
    pushUndo(outdenting?'⬅ Outdented "'+dragged.text.slice(0,24)+'"':'↳ Indented under "'+(target?.text||'').slice(0,24)+'"',tasks);
    persist(tasks.map(t=>t.id===draggedId?{...t,parentId:newParentId,...extra}:t));
  };
  // Undo: capture a snapshot of tasks *before* a destructive/bulk change, offer 5s window to restore it
  const pushUndo=(msg,prevTasks)=>{if(undoTimerRef.current)clearTimeout(undoTimerRef.current);setUndoState({msg,prevTasks});undoTimerRef.current=setTimeout(()=>setUndoState(null),5000)};
  const doUndo=()=>{if(!undoState)return;persist(undoState.prevTasks);setUndoState(null);if(undoTimerRef.current)clearTimeout(undoTimerRef.current)};
  // Pull-to-refresh — swipe down from top of the scrollable content to trigger Drive + Calendar sync
  const onTouchStartMain=e=>{if(scrollRef.current&&scrollRef.current.scrollTop<=0){pulling.current=true;pullY.current=e.touches[0].clientY}};
  const onTouchMoveMain=e=>{if(!pulling.current)return;const dy=e.touches[0].clientY-pullY.current;if(dy>70&&!refreshing){pulling.current=false;setRefreshing(true);(gcalOk?runDriveSync():Promise.resolve()).finally(()=>setTimeout(()=>setRefreshing(false),500))}};
  const onTouchEndMain=()=>{pulling.current=false};

  // Task operations
  const addTask=async(taskData)=>{
    const t={id:uid(),createdAt:new Date().toISOString(),dueDate:null,dueTime:null,labels:[],project:null,sectionId:null,priority:null,eisenhower:null,type:'task',status:'inbox',completedAt:null,calendarEventId:null,recurring:null,subtasks:[],goalType:null,parentId:null,weeklyFocus:false,...taskData};
    let newTasks=[...tasks,t];
    if(gcalOk&&t.dueDate){const cid=await gcal.create(t);if(cid){t.calendarEventId=cid;newTasks=newTasks.map(x=>x.id===t.id?t:x)}}
    persist(newTasks);
  };
  const complete=async id=>{
    const task=tasks.find(t=>t.id===id);if(!task)return;
    const upd={...task,status:'completed',completedAt:new Date().toISOString()};
    let nt=tasks.map(t=>t.id===id?upd:t);
    if(gcalOk&&upd.calendarEventId)safeDel(upd.calendarEventId);
    if(task.recurring&&task.dueDate){const nxt={...task,id:uid(),dueDate:nextRecur(task.dueDate,task.recurring),status:'active',completedAt:null,calendarEventId:null,createdAt:new Date().toISOString(),subtasks:[]};nt=[...nt,nxt];if(gcalOk){const cid=await gcal.create(nxt);if(cid)nt=nt.map(t=>t.id===nxt.id?{...t,calendarEventId:cid}:t)}}
    pushUndo('✅ Completed "'+task.text.slice(0,30)+'"',tasks);
    persist(nt);
  };
  const uncomplete=id=>persist(tasks.map(t=>t.id===id?{...t,status:t.dueDate?'active':'inbox',completedAt:null}:t));
  const archive=id=>{pushUndo('📦 Archived task',tasks);persist(tasks.map(t=>t.id===id?{...t,status:'archived'}:t))};
  const restore=id=>persist(tasks.map(t=>t.id===id?{...t,status:'inbox'}:t));
  const del=async id=>{const t=tasks.find(x=>x.id===id);if(gcalOk&&t?.calendarEventId)safeDel(t.calendarEventId);pushUndo('🗑️ Deleted "'+(t?.text||'').slice(0,30)+'"',tasks);persist(tasks.filter(x=>x.id!==id))};
  const toggleSub=(tid,sid)=>persist(tasks.map(t=>t.id!==tid?t:{...t,subtasks:(t.subtasks||[]).map(s=>s.id===sid?{...s,done:!s.done}:s)}));
  const saveEdit=async upd=>{
    // status: if has dueDate → active (scheduled), else inbox
    let s=upd.project?'active':!upd.dueDate?'inbox':'active';
    if(upd.status==='completed'||upd.status==='archived')s=upd.status;
    const old=tasks.find(t=>t.id===upd.id);let ceid=upd.calendarEventId;
    if(gcalOk){if(upd.dueDate&&s!=='archived'){if(!ceid)ceid=await gcal.create({...upd,status:s});else if(old?.dueDate!==upd.dueDate||old?.text!==upd.text){safeDel(ceid);ceid=await gcal.create({...upd,status:s})}}else if(ceid){safeDel(ceid);ceid=null}}
    // Sanity: a sectionId only makes sense if it belongs to the task's current project
    let sectionId=upd.sectionId||null;
    if(sectionId){const sec=sections.find(x=>x.id===sectionId);const prjObj=projects.find(p=>p.name===upd.project||p.id===upd.project);if(!sec||!prjObj||sec.projectId!==prjObj.id)sectionId=null}
    persist(tasks.map(t=>t.id===upd.id?{...upd,status:s,calendarEventId:ceid,sectionId}:t));setEditTask(null);
  };
  const syncAll=async()=>{setSyncing(true);const dated=tasks.filter(t=>t.dueDate&&t.status!=='archived'&&!t.calendarEventId);let upd=[...tasks];let cnt=0;for(const t of dated){const id=await gcal.create(t);if(id){upd=upd.map(u=>u.id===t.id?{...u,calendarEventId:id}:u);cnt++}}persist(upd);setSyncing(false);showToast('✅ Synced '+cnt+' tasks')};
  const exportJSON=()=>{const d={tasks,labels,projects,sections,mission,missionHistory,circleItems,lastWeeklyReview,reviewHistory,exportedAt:new Date().toISOString()};const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='braindump-backup-'+todayISO()+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);showToast('💾 Backup downloaded!')};

        </div>

/* ── Per-task expand/collapse state, shared by list views ── */
function useExpandState(){
  const [expandedIds,setExpandedIds]=useState(()=>new Set());
  const toggleExpand=id=>setExpandedIds(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n});
  const expandAll=(list,pool)=>{
    const ids=new Set();
    const addAll=t=>{const kids=childrenOf(t.id,pool);if(kids.length){ids.add(t.id);kids.forEach(addAll)}};
    list.forEach(addAll);
    setExpandedIds(ids);
  };
  const collapseAll=()=>setExpandedIds(new Set());
  return{expandedIds,toggleExpand,expandAll,collapseAll};
}

function useRowDrag(onReparent){
  const [dragId,setDragId]=useState(null);
  const [hoverId,setHoverId]=useState(null);
  const [pos,setPos]=useState({x:0,y:0});
  const info=useRef({active:false,taskId:null,startX:0,startY:0,moved:false});
  const onRowDown=(e,taskId)=>{const pt=e.touches?e.touches[0]:e;info.current={active:true,taskId,startX:pt.clientX,startY:pt.clientY,moved:false};setPos({x:pt.clientX,y:pt.clientY})};
  const onRowMove=e=>{
    if(!info.current.active)return;
    const pt=e.touches?e.touches[0]:e;
    const dx=pt.clientX-info.current.startX,dy=pt.clientY-info.current.startY;
    if(!info.current.moved&&Math.hypot(dx,dy)>12){info.current.moved=true;setDragId(info.current.taskId)}
    if(info.current.moved){
      e.preventDefault&&e.preventDefault();
      setPos({x:pt.clientX,y:pt.clientY});
      const el=document.elementFromPoint(pt.clientX,pt.clientY);
      const rowEl=el&&el.closest&&el.closest('[data-taskrow]');
      const hid=rowEl?rowEl.getAttribute('data-taskrow'):null;
      setHoverId(hid&&hid!==info.current.taskId?hid:null);
    }
  };
  const onRowUp=()=>{
    if(info.current.moved&&info.current.taskId&&hoverId)onReparent(info.current.taskId,hoverId);
    const wasDrag=info.current.moved;
    info.current={active:false,taskId:null,startX:0,startY:0,moved:false};
    setDragId(null);setHoverId(null);
    return wasDrag;
  };
  return{dragId,hoverId,pos,onRowDown,onRowMove,onRowUp};
}
// Floating preview that follows the finger while dragging, showing exactly what will happen on drop —
// same idea as Todoist's drop-line guide, adapted to our "drop onto a row to nest under it" model.
function DragGhost({dragId,hoverId,pos,pool}){
  if(!dragId)return null;
  const task=pool.find(t=>t.id===dragId);
  const target=hoverId?pool.find(t=>t.id===hoverId):null;
  if(!task)return null;
  return(
    <div className="fixed z-[70] pointer-events-none" style={{left:Math.min(pos.x+18,window.innerWidth-240),top:pos.y-12}}>
      <div className="bg-white rounded-xl px-3 py-2 shadow-2xl border-2 border-[var(--accent-400)]" style={{maxWidth:220}}>
        <p className="text-xs font-semibold text-stone-800 truncate">{task.text}</p>
        {target?(
          <p className="text-[10px] text-violet-600 font-bold mt-1 flex items-center gap-1">
            <span className="w-1.5 h-1.5 rounded-full bg-violet-500"/>↳ becomes sub-task of "{target.text.slice(0,22)}"
          </p>
        ):(
          <p className="text-[10px] text-stone-400 mt-1">Drop onto a task to nest under it</p>
        )}
      </div>
    </div>
  );
}

function TaskRow({task,onComplete,onEdit,projects,labels,showProject,showCreated,selectMode,isSelected,onSelect,onLongPress,depth=0,childCount=0,dragId,hoverId,onRowDown,onRowMove,onRowUp,isExpanded=false,onToggleExpand,orphanParentText=null}){
  const done=task.status==='completed';
  const isHeading=task.text.trim().startsWith('*');
  const displayText=isHeading?task.text.trim().slice(1).trim():task.text;
  const ep=effPri(task);
  const auto=!task.priority&&daysOver(task.dueDate)>=1;
  const prj=task.project?projects.find(p=>p.name===task.project||p.id===task.project):null;
  const circleColor=ep?PRI_COLOR[ep]:'#d1d5db';
  const lpTimer=useRef(null);
  const lpFired=useRef(false);
  const dragHandled=useRef(false);
  const startLP=e=>{
    lpFired.current=false;
    if(selectMode&&isSelected){onRowDown&&onRowDown(e,task.id);return} // already selected — any move from here on is a drag, no long-press wait needed
    lpTimer.current=setTimeout(()=>{lpFired.current=true;if(navigator.vibrate)navigator.vibrate(15);onLongPress&&onLongPress(task.id)},450);
  };
  const cancelLP=()=>{if(lpTimer.current){clearTimeout(lpTimer.current);lpTimer.current=null}};
  // Outside of "this row is selected", touch-move behaves exactly as before (just cancels the long-press
  // timer, no preventDefault) — normal list scrolling is never intercepted.
  const moveTouch=e=>{if(selectMode&&isSelected){onRowMove&&onRowMove(e)}else{cancelLP()}};
  const endTouch=()=>{cancelLP();if(selectMode&&isSelected&&onRowUp){const wasDrag=onRowUp();if(wasDrag)dragHandled.current=true}};
  const handleRowClick=()=>{if(lpFired.current){lpFired.current=false;return}if(dragHandled.current){dragHandled.current=false;return}selectMode?onSelect&&onSelect(task.id):!done&&onEdit(task)};
  const fmtCreatedShort=iso=>{if(!iso)return'';const d=new Date(iso);const now=new Date();const diff=Math.floor((now-d)/864e5);if(diff===0)return'Today '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});if(diff===1)return'Yesterday';if(diff<7)return diff+'d ago';return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})};
  const isBeingDragged=dragId===task.id;
  const isDropTarget=hoverId===task.id;

  return(
    <div data-taskrow={task.id} className={'bg-white select-none '+(done?'opacity-60':'')+(isSelected?' bg-[var(--accent-50)]':'')+(isBeingDragged?' opacity-30':'')+(isDropTarget?' bg-violet-50 ring-2 ring-violet-300 ring-inset':'')} style={{WebkitTouchCallout:'none',WebkitUserSelect:'none',userSelect:'none',touchAction:(selectMode&&isSelected)?'none':'auto',...(depth?{marginLeft:depth*18}:{})}}>
      <div className="flex gap-3 px-4 py-3" onClick={handleRowClick} onTouchStart={startLP} onTouchEnd={endTouch} onTouchMove={moveTouch} onMouseDown={startLP} onMouseMove={moveTouch} onMouseUp={endTouch} onMouseLeave={cancelLP}>
        {depth>0&&<span className="text-stone-300 flex-shrink-0 select-none" style={{marginTop:2}}>↳</span>}
        {/* Priority circle / select checkbox */}
        {selectMode?(
          <div className={'mt-0.5 w-5 h-5 rounded border-2 flex-shrink-0 flex items-center justify-center '+(isSelected?'bg-[var(--accent-500)] border-[var(--accent-500)]':'border-stone-300')}>
            {isSelected&&<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
          </div>
        ):isHeading?(
          <div className="mt-0.5 w-5 h-5 flex-shrink-0"/>
        ):(
        <button onClick={ev=>{ev.stopPropagation();onComplete(task.id)}}
          className="mt-0.5 w-5 h-5 rounded-full flex-shrink-0 flex items-center justify-center transition-all"
          style={{border:'2px solid '+circleColor,background:done?circleColor:'transparent'}}>
          {done&&<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
        </button>
        )}
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-1.5">
            {childCount>0&&(
              <button onClick={ev=>{ev.stopPropagation();onToggleExpand&&onToggleExpand(task.id)}} className="w-5 h-5 -ml-1 flex-shrink-0 flex items-center justify-center text-stone-400 active:text-stone-600">
                <span style={{fontSize:11}}>{isExpanded?'▾':'▸'}</span>
              </button>
            )}
            <p className={isHeading?'text-sm font-black text-stone-500 uppercase tracking-wide leading-snug':'text-sm leading-snug text-stone-800 '+(done?'line-through text-stone-400':'')}>{displayText}</p>
          </div>
          {orphanParentText&&<p className="text-[10px] text-violet-400 font-semibold mt-0.5 truncate">↳ Sub-task of "{orphanParentText.slice(0,40)}"</p>}
          <div className="flex flex-wrap items-center gap-2 mt-1">
            {task.dueDate&&(
              <span className={'text-[11px] font-semibold '+(isOverdue(task.dueDate)&&!done?'text-red-500':task.dueDate===todayISO()?'text-[var(--accent-600)]':'text-stone-400')}>
                📅 {fmtDate(task.dueDate)}{task.dueTime?' ⏰ '+fmtTime(task.dueTime):''}{auto&&!done?' ⬆':''}
              </span>
            )}
            {task.deadline&&<span className={'text-[11px] font-semibold '+(isOverdue(task.deadline)&&!done?'text-red-500':'text-orange-500')}>🚩 {fmtDate(task.deadline)}</span>}
            {task.duration&&<span className="text-[10px] text-stone-400">⏱ {task.duration<60?task.duration+'m':(task.duration/60)+'h'}</span>}
            {showProject&&prj&&<span className="text-[11px] font-semibold" style={{color:prj.color}}>● {prj.name}</span>}
            {(task.labels||[]).slice(0,2).map(l=><span key={l} className="text-[10px] text-stone-400">#{l}</span>)}
            {task.recurring&&<span className="text-[10px] text-teal-500">🔄</span>}

          </div>
        </div>
      </div>
      <div className="ml-16 h-px bg-stone-100"/>
    </div>
  );
}

      </div>

      {/* Labels */}
      {labels.length>0&&(
        <div className="mt-2 pb-6">
          <div className="flex items-center justify-between px-4 py-2">
            <span className="text-xs font-black text-stone-500 uppercase tracking-widest">Labels</span>

    </div>
  );

/* ── Filters & Labels View ───────────────────────────── */
function FiltersLabelsView({tasks,labels,onNav,onRenameLabel,onRemoveLabel,onEdit,onComplete,onToggleSub,projects,customFilters,onSaveFilters}){

  const [editingLbl,setEditingLbl]=useState(null);
  const [showBuilder,setShowBuilder]=useState(false);
  const [fName,setFName]=useState('');

  const saveFilter=()=>{
    if(!fName.trim())return;
    onSaveFilters([...(customFilters||[]),{id:uid(),name:fName.trim(),project:fPrj||null,label:fLbl||null,priority:fPri||null}]);

    {ico:'🟠',l:'Priority 2',n:tasks.filter(t=>t.priority==='P2').length,fn:()=>onNav('search',{_filter:'p2'})},
    {ico:'🔵',l:'Priority 3',n:tasks.filter(t=>t.priority==='P3').length,fn:()=>onNav('search',{_filter:'p3'})},
    {ico:'⚪',l:'Priority 4',n:tasks.filter(t=>t.priority==='P4'||!t.priority).length,fn:()=>onNav('search',{_filter:'p4'})},
    {ico:'📋',l:'View all',n:tasks.length,fn:()=>onNav('scheduled')},
    {ico:'📭',l:'No due date',n:tasks.filter(t=>!t.dueDate).length,fn:()=>onNav('inbox')},

    <div className="pb-24">
      <div className="flex items-center gap-3 px-4 pt-5 pb-4">

            <select value={fPrj} onChange={e=>setFPrj(e.target.value)} className="w-full px-3 py-2 text-xs border border-stone-200 rounded-xl bg-white"><option value="">Any project</option>{projects.map(p=><option key={p.id||p.name} value={p.name}>{p.name}</option>)}</select>
            <select value={fLbl} onChange={e=>setFLbl(e.target.value)} className="w-full px-3 py-2 text-xs border border-stone-200 rounded-xl bg-white"><option value="">Any label</option>{labels.map(l=><option key={l} value={l}>#{l}</option>)}</select>
            <select value={fPri} onChange={e=>setFPri(e.target.value)} className="w-full px-3 py-2 text-xs border border-stone-200 rounded-xl bg-white"><option value="">Any priority</option>{['P1','P2','P3','P4'].map(p=><option key={p} value={p}>{p}</option>)}</select>
            <div className="flex gap-2">
